<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Commodity Intelligence Dashboard</title>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .dropdown { background-color: #1e293b; color: white; border: 1px solid #334155; padding: 8px; border-radius: 4px; }
        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background-color: #121826; border: 1px solid #1e293b; border-radius: 8px; padding: 15px; }
        .chart-container { height: 480px; width: 100%; }
        .bottom-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .metric-value { font-size: 20px; font-weight: bold; margin-top: 10px; }
    </style>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-weight:bold; font-size:20px;">COMMODITY<span>.INTELLIGENCE</span></div>
        <select class="dropdown" id="asset-select" onchange="loadDashboard()">
            <option value="CC1!">Kakao (CC1!)</option>
            <option value="KC1!">Kaffee (KC1!)</option>
            <option value="SB1!">Zucker (SB1!)</option>
            <option value="ZS1!">Sojabohnen (ZS1!)</option>
            <option value="HG1!">Kupfer (HG1!)</option>
            <option value="CL1!">Rohöl WTI (CL1!)</option>
            <option value="GC1!">Gold (GC1!)</option>
            <option value="SI1!">Silber (SI1!)</option>
            <option value="W1!">Weizen (W1!)</option>
        </select>
    </div>

    <div class="grid-layout">
        <div class="card" style="padding:0; overflow:hidden;">
            <div id="chart-wrapper" class="chart-container"></div>
        </div>
        <div class="card">
            <div style="font-size:12px; color:#94a3b8; text-transform:uppercase;">Markt-News</div>
            <p style="color:#64748b;">Daten werden geladen...</p>
        </div>
    </div>

    <div class="bottom-grid">
        <div class="card"><div style="font-size:12px; color:#94a3b8;">SENTIMENT</div><div id="sentiment" class="metric-value">Neutral</div></div>
        <div class="card"><div style="font-size:12px; color:#94a3b8;">STRUKTUR</div><div id="struktur" class="metric-value">--</div></div>
        <div class="card"><div style="font-size:12px; color:#94a3b8;">POSITION</div><div id="position" class="metric-value">--</div></div>
        <div class="card"><div style="font-size:12px; color:#94a3b8;">TREND</div><div id="trend" class="metric-value">--</div></div>
    </div>
</div>

<script>
function loadDashboard() {
    const symbol = document.getElementById('asset-select').value;
    
    // Chart neu initialisieren
    document.getElementById('chart-wrapper').innerHTML = "";
    new TradingView.widget({
        "container_id": "chart-wrapper",
        "symbol": symbol,
        "theme": "dark",
        "style": "1",
        "locale": "de",
        "width": "100%",
        "height": "100%"
    });

    // Reset Boxen
    document.getElementById('sentiment').innerText = "Wird geladen...";
}

window.onload = loadDashboard;
</script>
</body>
</html>
