<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Commodity Intelligence</title>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .dropdown { background-color: #1e293b; color: white; border: 1px solid #334155; padding: 8px; border-radius: 4px; }
        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background-color: #121826; border: 1px solid #1e293b; border-radius: 8px; padding: 15px; overflow: hidden; }
        .chart-container { height: 480px; width: 100%; }
    </style>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="font-weight:bold; font-size:20px;">COMMODITY<span>.INTELLIGENCE</span></div>
        <select class="dropdown" id="asset-select" onchange="loadDashboard()">
            <option value="CC1!">Kakao</option>
            <option value="KC1!">Kaffee</option>
            <option value="SB1!">Zucker</option>
            <option value="ZS1!">Sojabohnen</option>
            <option value="HG1!">Kupfer</option>
            <option value="CL1!">Rohöl WTI</option>
            <option value="GC1!">Gold</option>
        </select>
    </div>

    <div class="grid-layout">
        <div class="card" style="padding:0;">
            <div id="chart-wrapper" class="chart-container"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card" style="height: 250px;">
                <iframe width="100%" height="100%" src="https://embed.windy.com/embed2.html?lat=50&lon=10&zoom=5" frameborder="0"></iframe>
            </div>
            <div class="card" style="height: 300px;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                { "feedMode": "market", "market": "commodities", "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%" }
                </script>
            </div>
        </div>
    </div>
</div>

<script>
function loadDashboard() {
    const symbol = document.getElementById('asset-select').value;
    document.getElementById('chart-wrapper').innerHTML = "";
    new TradingView.widget({
        "container_id": "chart-wrapper",
        "symbol": symbol,
        "theme": "dark",
        "style": "1",
        "width": "100%",
        "height": "100%"
    });
}
window.onload = loadDashboard;
</script>
</body>
</html>
