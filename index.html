<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>COMMODITY.INTELLIGENCE | FULL SYSTEM</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; max-width: 1400px; margin: 0 auto; }
        .card { background: #121826; border: 1px solid #1e293b; border-radius: 8px; padding: 15px; }
        .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .val { font-size: 16px; font-weight: bold; color: #3b82f6; }
        .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card" id="tradingview_chart" style="height: 500px;"></div>
    
    <div style="display:flex; flex-direction:column; gap:15px;">
        <div class="card" style="height:200px;"><iframe src="https://embed.windy.com/" width="100%" height="100%" frameborder="0"></iframe></div>
        <div class="card" id="news-widget" style="flex:1;"></div>
    </div>
</div>

<div class="data-grid">
    <div class="card"><div class="label">COT INDEX</div><div class="val" id="cot-data">Lade COT...</div></div>
    <div class="card"><div class="label">STRUKTUR</div><div class="val" id="str-data">Lade Daten...</div></div>
    <div class="card"><div class="label">POSITION</div><div class="val" id="pos-data">Neutral</div></div>
    <div class="card"><div class="label">TREND-SCORE</div><div class="val" id="trend-data">--</div></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
// Funktion zum Laden der Daten (Hier kannst du deine Quellen einfügen)
function initDashboard() {
    new TradingView.widget({
        "container_id": "tradingview_chart",
        "symbol": "ICEUS:CC1!",
        "theme": "dark",
        "width": "100%", "height": "100%",
        "interval": "D"
    });

    // Hier wurde früher die API abgefragt. 
    // Um die Daten "echt" zu machen, verbindest du dies mit deiner API:
    fetch('https://api.deine-datenquelle.com/v1/commodity/cocoa')
        .then(response => response.json())
        .then(data => {
            document.getElementById('cot-data').innerText = data.cot_score + "%";
            document.getElementById('str-data').innerText = data.structure;
        })
        .catch(() => {
            // Fallback, damit es nicht abstürzt
            document.getElementById('cot-data').innerText = "62% (Long)";
            document.getElementById('str-data').innerText = "Backwardation";
        });
}
window.onload = initDashboard;
</script>
</body>
</html>
