<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Intelligence - Multi-Asset Dashboard</title>
    <style>
        /* Grundlegendes Styling im Dark-Mode */
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .logo span {
            color: #3b82f6;
        }
        .dropdown {
            background-color: #1e293b;
            color: white;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        .dropdown:focus {
            border-color: #3b82f6;
        }
        .grid-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        /* Standard-Karte */
        .card {
            background-color: #121826;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        /* Chart-Karte ohne störende Innenabstände */
        .chart-card {
            background-color: #131722;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }
        .chart-header {
            padding: 15px 15px 5px 15px;
        }
        .card-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #94a3b8;
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .chart-container {
            height: 480px;
            width: 100%;
            position: relative;
        }
        .bottom-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
            transition: all 0.3s ease;
        }
        .text-blue { color: #3b82f6; }
        .text-neutral { color: #94a3b8; }
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }
    </style>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">COMMODITY<span>.INTELLIGENCE</span></div>
        
        <select class="dropdown" id="asset-select" onchange="onAssetChange()">
            <option value="CAPITALCOM:COCOA|CC=F">Kakao (CC=F)</option>
            <option value="CAPITALCOM:COFFEE|KC=F">Kaffee (KC=F)</option>
            <option value="CAPITALCOM:SUGAR|SB=F">Zucker (SB=F)</option>
            <option value="CAPITALCOM:SOYBEAN|ZS=F">Sojabohnen (ZS=F)</option>
            <option value="CAPITALCOM:COPPER|HG=F">Kupfer (HG=F)</option>
            <option value="CAPITALCOM:USCRUDE|CL=F">Rohöl WTI (CL=F)</option>
            <option value="FOREXCOM:XAUUSD|GC=F">Gold (GC=F)</option>
            <option value="FOREXCOM:XAGUSD|SI=F">Silber (SI=F)</option>
            <option value="CAPITALCOM:WHEAT|W=F">Weizen (W=F)</option>
