<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Terminal</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .card { max-width: 450px; margin: auto; background: #0f172a; border-radius: 16px; padding: 20px; border: 1px solid #1e293b; }
        select { width: 100%; padding: 15px; background: #1e293b; color: white; border-radius: 10px; border: 1px solid #334155; font-weight: bold; margin-bottom: 20px; }
        canvas { width: 100%; height: 180px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; }
        .news { margin-top: 15px; font-size: 13px; color: #cbd5e1; border-top: 1px solid #1e293b; padding-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <select id="assets" onchange="update()"></select>
        <canvas id="chart"></canvas>
        <div class="news" id="news">Wähle ein Asset...</div>
    </div>
    <script>
        const db = {
            "Gold": { n: "Gold (GC=F)", news: "Zentralbank-Käufe auf Rekordniveau." },
            "Rohöl": { n: "Rohöl (CL=F)", news: "OPEC+ signalisiert Förderkürzungen." },
            "Silber": { n: "Silber (SI=F)", news: "Industrielle Nachfrage wächst massiv." },
            "Kupfer": { n: "Kupfer (HG=F)", news: "Minen-Engpässe verknappen Angebot." },
            "Erdgas": { n: "Erdgas (NG=F)", news: "Hitzewellen treiben Energiebedarf." },
            "Soja": { n: "Sojabohnen (ZS=F)", news: "Exportnachfrage bleibt trotz hoher Preise stark." },
            "Mais": { n: "Mais (ZC=F)", news: "US-Ernteberichte zeigen Stabilität." },
            "Weizen": { n: "Weizen (ZW=F)", news: "Wetterbedingungen in Russland belasten Ernte." },
            "Kaffee": { n: "Kaffee (KC=F)", news: "Ernteausfälle in Brasilien treiben Preise." },
            "Kakao": { n: "Kakao (CC=F)", news: "Historische Knappheit durch Wetterkapriolen." },
            "Zucker": { n: "Zucker (SB=F)", news: "Produktionsprognosen wurden gesenkt." }
        };
        const sel = document.getElementById('assets');
        Object.keys(db).forEach(k => sel.innerHTML += `<option value="${k}">${k}</option>`);
        function update() {
            document.getElementById('news').innerText = "📰 " + db[sel.value].news;
            draw();
        }
        function draw() {
            const canvas = document.getElementById('chart'), ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#10b981'; ctx.lineWidth = 3; ctx.beginPath();
            for(let i=0; i<20; i++) ctx.lineTo(i * (canvas.width/19), Math.random() * (canvas.height-40) + 20);
            ctx.stroke();
        }
        update();
    </script>
</body>
</html>
