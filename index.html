<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Commodity Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #0b0f19; color: #e2e8f0; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: #0f172a; border-radius: 16px; padding: 16px; border: 1px solid #1e293b; }
        .dropdown-container { position: relative; }
        select { width: 100%; padding: 12px; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 8px; font-weight: 600; margin-bottom: 15px; appearance: none; cursor: pointer; }
        .dropdown-container::after { content: '▼'; font-size: 10px; position: absolute; right: 15px; top: 15px; color: #94a3b8; pointer-events: none; }
        #chart { width: 100%; height: 250px; background: #020617; border-radius: 8px; }
        .news { margin-top: 15px; font-size: 13px; color: #94a3b8; border-top: 1px solid #1e293b; padding-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <div class="dropdown-container">
            <select id="asset-select" onchange="update()"></select>
        </div>
        <div id="chart"></div>
        <div class="news" id="news">Lade Marktdaten...</div>
    </div>

    <script>
        const assets = {
            "CL=F": { n: "Rohöl", news: "OPEC+ signalisiert Förderkürzungen. Märkte volatil." },
            "GC=F": { n: "Gold", news: "Zentralbank-Käufe stützen den Preis. Zinspolitik im Fokus." },
            "SI=F": { n: "Silber", news: "Industrielle Nachfrage (Photovoltaik) wächst stetig." }
        };

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { type: 'solid', color: '#020617' }, textColor: '#94a3b8' },
            grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
            width: 418, height: 250
        });
        const candleSeries = chart.addCandlestickSeries();
        const volSeries = chart.addHistogramSeries({ color: '#1e293b', priceFormat: { type: 'volume' }, priceScaleId: '' });
        volSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

        const sel = document.getElementById('asset-select');
        Object.keys(assets).forEach(k => sel.innerHTML += `<option value="${k}">${assets[k].n}</option>`);

        async function update() {
            const t = sel.value;
            document.getElementById('news').innerText = "📰 " + assets[t].news;
            const res = await fetch(`https://corsproxy.io/?https://query2.finance.yahoo.com/v8/finance/chart/${t}?range=1mo&interval=1d`);
            const j = await res.json();
            const q = j.chart.result[0].indicators.quote[0];
            const data = q.close.map((c, i) => ({
                time: j.chart.result[0].timestamp[i],
                open: q.open[i], high: q.high[i], low: q.low[i], close: c
            }));
            candleSeries.setData(data);
            volSeries.setData(q.volume.map((v, i) => ({ time: j.chart.result[0].timestamp[i], value: v, color: v > q.volume[i-1] ? '#10b981' : '#ef4444' })));
        }
        update();
    </script>
</body>
</html>
