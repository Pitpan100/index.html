<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Commodity Dashboard</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; margin: 0; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #121826; border-radius: 8px; overflow: hidden; }
        #chart { height: 450px; }
        select { background: #1e293b; color: white; width: 100%; padding: 10px; }
    </style>
</head>
<body>

<select id="asset" onchange="update()">
    <option value="CC1!">Kakao</option><option value="KC1!">Kaffee</option>
    <option value="SB1!">Zucker</option><option value="ZS1!">Soja</option>
    <option value="HG1!">Kupfer</option><option value="CL1!">Rohöl</option>
    <option value="GC1!">Gold</option>
</select>

<div class="grid">
    <div id="chart" class="card"></div>
    <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="card"><iframe src="https://embed.windy.com/" width="100%" height="200"></iframe></div>
        <div class="card" id="news"></div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
function update() {
    new TradingView.widget({"container_id":"chart","symbol":document.getElementById('asset').value,"theme":"dark","width":"100%","height":"100%"});
}
// News Widget laden
new TradingView.widget({"container_id":"news","symbol":"GC1!","theme":"dark","width":"100%","height":"300","widgetType":"timeline"});
update();
</script>
</body>
</html>
