<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Commodity Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0b0f19; color: #f3f4f6; }</style>
</head>
<body class="p-4 max-w-md mx-auto">
    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 mb-4">
        <h1 class="text-xl font-bold text-amber-400">Commodity Intelligence</h1>
        <p class="text-xs text-slate-400">100% Autark via CFTC & Yahoo API</p>
    </div>

    <!-- Das UI bleibt identisch zu deinem vorherigen Dashboard, zieht die Daten aber aus dem window.cotData Objekt -->
    <div class="bg-slate-900 rounded-xl p-4 border border-slate-800 space-y-4">
        <div class="bg-slate-950 p-3 rounded-lg text-center">
            <p class="text-xs text-slate-400" id="asset-title">Lade Asset...</p>
            <p class="text-2xl font-black text-emerald-400" id="live-price">0.00 USD</p>
        </div>
        
        <div class="bg-slate-950 p-3 rounded-lg text-xs space-y-2">
            <div class="flex justify-between"><span>Commercial COT Score:</span><span id="cot-score" class="font-bold">--</span></div>
            <div class="flex justify-between"><span>Positionierung:</span><span id="cot-position" class="font-mono">--</span></div>
        </div>

        <div class="flex justify-between gap-2">
            <button onclick="prev()" class="bg-slate-800 px-4 py-2 rounded text-xs font-bold">&lt;</button>
            <button onclick="next()" class="bg-slate-800 px-4 py-2 rounded text-xs font-bold">&gt;</button>
        </div>
    </div>

    <!-- HIER SPEICHERT DER ROBOTER DIE DATEN AUTOMATISCH REIN -->
    <script id="cot-database">
        window.cotData = {
            "CL=F": { name: "Rohöl", cotScore: 55, position: "Neutral" },
            "GC=F": { name: "Gold", cotScore: 42, position: "Net-Short" },
            "NG=F": { name: "Erdgas", cotScore: 88, position: "Net-Long" }
        };
    </script>

    <script>
        const tickers = Object.keys(window.cotData);
        let index = 0;

        async function updateUI() {
            const ticker = tickers[index];
            const data = window.cotData[ticker];
            document.getElementById('asset-title').innerText = data.name;
            document.getElementById('cot-score').innerText = data.cotScore + "/100";
            document.getElementById('cot-position').innerText = data.position;

            // Live-Preise von Yahoo laden
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + ticker)}`);
                const json = await res.json();
                const meta = JSON.parse(json.contents).chart.result[0].meta;
                document.getElementById('live-price').innerText = `${meta.regularMarketPrice} ${meta.currency}`;
            } catch(e) { console.log("Price fetch error"); }
        }
        function next() { index = (index + 1) % tickers.length; updateUI(); }
        function prev() { index = (index - 1 + tickers.length) % tickers.length; updateUI(); }
        updateUI();
    </script>
</body>
</html>
