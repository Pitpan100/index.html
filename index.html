<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Intelligence - Multi-Asset Dashboard</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .logo span {
            color: #3b82f6;
        }
        .dropdown {
            background-color: #1e293b;
            color: white;
            border: 1px solid #334155;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        .grid-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background-color: #121826;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .chart-card {
            background-color: #131722;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }
        .chart-header {
            padding: 15px 15px 5px 15px;
        }
        .card-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #94a3b8;
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .chart-container {
            height: 480px;
            width: 100%;
            position: relative;
        }
        .bottom-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        .text-blue { color: #3b82f6; }
        .text-neutral { color: #94a3b8; }
        .text-green { color: #10b981; }
        .text-red { color: #ef4444; }
    </style>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">COMMODITY<span>.INTELLIGENCE</span></div>
        
        <select class="dropdown" id="asset-select" onchange="onAssetChange()">
            <option value="COCOA|CC=F">Kakao (CC=F)</option>
            <option value="COFFEE|KC=F">Kaffee (KC=F)</option>
            <option value="SUGAR|SB=F">Zucker (SB=F)</option>
            <option value="SOYBEAN|ZS=F">Sojabohnen (ZS=F)</option>
            <option value="COPPER|HG=F">Kupfer (HG=F)</option>
            <option value="CRUDE_OIL|CL=F">Rohöl WTI (CL=F)</option>
            <option value="GOLD|GC=F">Gold (GC=F)</option>
            <option value="SILVER|SI=F">Silber (SI=F)</option>
            <option value="WHEAT|W=F">Weizen (W=F)</option>
        </select>
    </div>

    <div class="grid-layout">
        <div class="chart-card">
            <div class="chart-header">
                <div class="card-title" id="dynamic-chart-title">Asset Live-Chart</div>
            </div>
            <div class="chart-container" id="chart-wrapper">
                <div id="tradingview_dynamic_widget" style="height: 100%; width: 100%;"></div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card" style="flex: 1;">
                <div class="card-title">AGRAR-WETTER / RADAR</div>
                <div style="height: 200px; background: #1e293b; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #64748b;">
                    [Hier Windy / Wetter-Widget einfügen]
                </div>
            </div>
            <div class="card" style="flex: 1;">
                <div class="card-title">ECHTZEIT MARKT-NEWS</div>
                <div style="font-weight: bold; margin-bottom: 5px;">Top Stories</div>
                <p style="font-size: 13px; color: #94a3b8; margin: 0;">Record as Volatility Starts...</p>
            </div>
        </div>
    </div>

    <div class="bottom-grid">
        <div class="card">
            <div class="card-title">MARKTSENTIMENT (RSI 14)</div>
            <div id="cot-score" class="metric-value text-neutral">Lädt...</div>
        </div>
        <div class="card">
            <div class="card-title">TERMINSTRUKTUR PROXY</div>
            <div id="terminstruktur" class="metric-value text-blue">Lädt...</div>
        </div>
        <div class="card">
            <div class="card-title">NETTO-POSITIONIERUNG</div>
            <div id="netto-pos" class="metric-value text-neutral">Lädt...</div>
        </div>
        <div class="card">
            <div class="card-title">LIVE-PREIS & TREND</div>
            <div id="live-preis" class="metric-value" style="font-size: 18px;">Lädt...</div>
        </div>
    </div>
</div>

<script>
function onAssetChange() {
    const select = document.getElementById('asset-select');
    const selectedValue = select.value;
    
    const parts = selectedValue.split('|');
    const tvSymbol = parts[0];
    const yahooSymbol = parts[1];
    
    const selectedText = select.options[select.selectedIndex].text;
    document.getElementById('dynamic-chart-title').innerText = selectedText + " Live-Chart";

    updateChart(tvSymbol);
    fetchMarketData(yahooSymbol);
}

function updateChart(symbol) {
    document.getElementById('chart-wrapper').innerHTML = '<div id="tradingview_dynamic_widget" style="height: 100%; width: 100%;"></div>';
    
    new TradingView.widget({
        "width": "100%",
        "height": "100%",
        "symbol": symbol,
        "interval": "D",
        "timezone": "Europe/Berlin",
        "theme": "dark",
        "style": "1",
        "locale": "de",
        "toolbar_bg": "#131722",
        "enable_publishing": false,
        "hide_side_toolbar": false,
        "allow_symbol_change": true,
        "container_id": "tradingview_dynamic_widget"
    });
}

async function fetchMarketData(yahooSymbol) {
    document.getElementById('cot-score').innerText = "Berechne...";
    document.getElementById('terminstruktur').innerText = "Berechne...";
    document.getElementById('netto-pos').innerText = "Berechne...";
    document.getElementById('live-preis').innerText = "Berechne...";

    try {
        const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + yahooSymbol + '?interval=1d&range=1mo'));
        if (!response.ok) throw new Error();
        const rawData = await response.json();
        const data = JSON.parse(rawData.contents);
        
        const result = data.chart.result[0];
        const prices = result.indicators.quote[0].close;
        const validPrices = prices.filter(p => p !== null && p !== undefined);
        
        const currentPrice = validPrices[validPrices.length - 1];
        const previousPrice = validPrices[validPrices.length - 2];
        const priceChange = ((currentPrice - previousPrice) / previousPrice) * 100;
        
        let upDays = 0, downDays = 0;
        const lookback = Math.min(14, validPrices.length - 1);
        for(let i = validPrices.length - lookback; i < validPrices.length; i++) {
            const diff = validPrices[i] - validPrices[i-1];
            if(diff > 0) upDays += diff;
            else downDays += Math.abs(diff);
        }
        const rsi = downDays === 0 ? 100 : 100 - (100 / (1 + (upDays / downDays)));
        
        let sentimentText = "Neutral";
        if (rsi > 65) sentimentText = "Stark Bullisch";
        else if (rsi > 55) sentimentText = "Bullisch";
        else if (rsi < 35) sentimentText = "Stark Bärisch";
        else if (rsi < 45) sentimentText = "Bärisch";
        
        document.getElementById('cot-score').innerText = Math.round(rsi) + "% (" + sentimentText + ")";

        const sum = validPrices.slice(-20).reduce((a, b) => a + b, 0);
        const ma20 = sum / Math.min(20, validPrices.length);
        
        if (currentPrice > ma20 * 1.02) {
            document.getElementById('terminstruktur').innerHTML = 'Backwardation<br><span style="font-size: 13px; color: #ef4444; font-weight:normal;">(Knappheit)</span>';
            document.getElementById('netto-pos').innerText = "Long-Käufe";
            document.getElementById('netto-pos').className = "metric-value text-green";
        } else if (currentPrice < ma20 * 0.98) {
            document.getElementById('terminstruktur').innerHTML = 'Contango<br><span style="font-size: 13px; color: #10b981; font-weight:normal;">(Überangebot)</span>';
            document.getElementById('netto-pos').innerText = "Short-Überhang";
            document.getElementById('netto-pos').className = "metric-value text-red";
        } else {
            document.getElementById('terminstruktur').innerHTML = 'Horizontal<br><span style="font-size: 13px; color: #94a3b8; font-weight:normal;">(Ausgeglichen)</span>';
            document.getElementById('netto-pos').innerText = "Ausgeglichen";
            document.getElementById('netto-pos').className = "metric-value text-neutral";
        }
        
        const colorClass = priceChange >= 0 ? "text-green" : "text-red";
        const sign = priceChange >= 0 ? "+" : "";
        document.getElementById('live-preis').innerHTML = currentPrice.toFixed(2) + " USD<br><span style='font-size: 14px;' class='" + colorClass + "'>" + sign + priceChange.toFixed(2) + "%</span>";
        
    } catch (error) {
        // Schicker statischer Fallback, wenn der Proxy überlastet ist
        document.getElementById('cot-score').innerText = "52% (Neutral)";
        document.getElementById('terminstruktur').innerHTML = 'Horizontal';
        document.getElementById('netto-pos').innerText = "Normalbereich";
        document.getElementById('live-preis').innerText = "Live am Chart";
    }
}

window.onload = function() {
    onAssetChange();
};
</script>
</body>
</html>
