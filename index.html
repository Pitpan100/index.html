<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>COMMODITY.INTELLIGENCE</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { margin-bottom: 20px; }
        select { width: 100%; padding: 15px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-bottom: 15px; }
        .card { background: #121826; border: 1px solid #1e293b; border-radius: 8px; padding: 15px; }
        .data-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .label { font-size: 10px; text-transform: uppercase; color: #94a3b8; }
        .value { font-size: 18px; font-weight: bold; margin-top: 5px; color: #3b82f6; }
    </style>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <select id="asset" onchange="updateDashboard()">
            <option value="ICEUS:CC1!" data-cot="65% (Long)" data-str="Backwardation" data-pos="Bullisch" data-seas="Saisonal hoch">Kakao (CC)</option>
            <option value="ICEUS:KC1!" data-cot="42% (Neutral)" data-str="Contango" data-pos="Neutral" data-seas="Saisonal tief">Kaffee (KC)</option>
            <option value="ICEUS:SB1!" data-cot="58% (Long)" data-str="Backwardation" data-pos="Bullisch" data-seas="Stabil">Zucker (SB)</option>
            <option value="CBOT:ZS1!" data-cot="35% (Short)" data-str="Contango" data-pos="Bearisch" data-seas="Abwärts">Soja (ZS)</option>
            <option value="COMEX:HG1!" data-cot="60% (Long)" data-str="Backwardation" data-pos="Bullisch" data-seas="Stark">Kupfer (HG)</option>
            <option value="NYMEX:CL1!" data-cot="45% (Neutral)" data-str="Contango" data-pos="Neutral" data-seas="Volatil">Rohöl (CL)</option>
        </select>
    </div>

    <div class="grid">
        <div class="card" id="chart" style="height: 450px;"></div>
        <div class="card"><iframe src="https://embed.windy.com/" width="100%" height="400" frameborder="0"></iframe></div>
    </div>

    <div class="data-box">
        <div class="card"><div class="label">COT SCORE</div><div class="value" id="cot">--</div></div>
        <div class="card"><div class="label">STRUKTUR</div><div class="value" id="str">--</div></div>
        <div class="card"><div class="label">POSITION</div><div class="value" id="pos">--</div></div>
        <div class="card"><div class="label">SAISONAL</div><div class="value" id="seas">--</div></div>
    </div>
</div>

<script>
function updateDashboard() {
    const sel = document.getElementById('asset');
    const opt = sel.options[sel.selectedIndex];
    
    // Chart stabil laden mit explizitem Börsenplatz
    document.getElementById('chart').innerHTML = "";
    new TradingView.widget({
        "container_id": "chart",
        "symbol": sel.value,
        "theme": "dark",
        "width": "100%", "height": "100%",
        "allow_symbol_change": false, // Verhindert Apple-Fehler!
        "interval": "D"
    });

    // Daten aus dem Pulldown-Menü abgreifen
    document.getElementById('cot').innerText = opt.dataset.cot;
    document.getElementById('str').innerText = opt.dataset.str;
    document.getElementById('pos').innerText = opt.dataset.pos;
    document.getElementById('seas').innerText = opt.dataset.seas;
}
window.onload = updateDashboard;
</script>
</body>
</html>
