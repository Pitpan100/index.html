<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>COMMODITY.INTELLIGENCE DASHBOARD</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .grid-data { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: #121826; border: 1px solid #1e293b; border-radius: 8px; padding: 20px; }
        .label { color: #94a3b8; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; }
        .value { font-size: 24px; font-weight: bold; color: #3b82f6; }
        select { width: 100%; padding: 15px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; margin-bottom: 20px; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <select id="asset-select" onchange="updateData()">
        <option value="COCOA">Kakao (CC)</option>
        <option value="COFFEE">Kaffee (KC)</option>
        <option value="SUGAR">Zucker (SB)</option>
        <option value="SOYBEANS">Sojabohnen (ZS)</option>
        <option value="COPPER">Kupfer (HG)</option>
        <option value="CRUDE_OIL">Rohöl (CL)</option>
    </select>

    <div class="grid-data">
        <div class="card"><div class="label">MARTSENTIMENT (RSI)</div><div class="value" id="sentiment">Wird geladen...</div></div>
        <div class="card"><div class="label">TERMINSTRUKTUR</div><div class="value" id="struktur">Wird geladen...</div></div>
        <div class="card"><div class="label">NETTO-POSITIONIERUNG</div><div class="value" id="position">Wird geladen...</div></div>
        <div class="card"><div class="label">SAISONALER TREND</div><div class="value" id="trend">Wird geladen...</div></div>
    </div>

    <div class="card">
        <div class="label">AKTUELLE MARKT-NEWS</div>
        <div id="news-container" style="height: 300px;">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
            { "feedMode": "market", "market": "commodities", "colorTheme": "dark", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%" }
            </script>
        </div>
    </div>
</div>

<script>
function updateData() {
    const asset = document.getElementById('asset-select').value;
    
    // Wir simulieren hier den Echtzeit-Daten-Update-Prozess für die Felder
    // da direkte API-Abfragen vom iPad aus vom Browser blockiert werden.
    document.getElementById('sentiment').innerText = "52% (Neutral)";
    document.getElementById('struktur').innerText = asset === 'CRUDE_OIL' ? "Contango" : "Backwardation";
    document.getElementById('position').innerText = "Long-Dominanz";
    document.getElementById('trend').innerText = "Zyklisch Stabil";
}
window.onload = updateData;
</script>
</body>
</html>
