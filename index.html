<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div class="bg-slate-900 p-4 rounded-xl shadow-md border border-slate-800 mb-4">
        <h1 class="text-xl font-bold tracking-tight">Commodity Intelligence Dashboard</h1>
        <p class="text-xs text-slate-400 mt-1">Terminstrukturen, Wetter, Politik & Confluence-Integration</p>
    </div>

    <!-- Hauptkarte -->
    <div class="bg-slate-900 rounded-xl p-4 border border-slate-800 shadow-sm space-y-4">
        
        <!-- Tabelle für Metriken -->
        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs text-slate-300">
                <thead>
                    <tr class="border-b border-slate-800 text-slate-400">
                        <th class="pb-2">Metrik</th>
                        <th class="pb-2">Wert</th>
                        <th class="pb-2 text-center">Score</th>
                        <th class="pb-2 pl-2">Marktanalyse</th>
                    </tr>
                </thead>
                <tbody id="metrics-body">
                    <!-- Wird dynamisch befüllt -->
                </tbody>
            </table>
        </div>

        <hr class="border-slate-800">

        <!-- Scores unten -->
        <div class="grid grid-cols-2 gap-4 text-center py-2 bg-slate-950 rounded-lg">
            <div>
                <p class="text-[10px] uppercase text-slate-500 font-semibold tracking-wider">Markt-Score</p>
                <p id="total-score" class="text-base font-bold text-emerald-400 mt-0.5">--/100</p>
            </div>
            <div>
                <p class="text-[10px] uppercase text-slate-500 font-semibold tracking-wider">Struktur</p>
                <p id="structure-val" class="text-xs font-medium text-slate-200 mt-1">--</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="space-y-3 pt-2">
            <div class="flex items-center justify-between bg-slate-950 p-2 rounded-lg border border-slate-800">
                <span class="text-xs text-slate-400 font-medium pl-1">Rohstoff</span>
                <div class="flex items-center space-x-1">
                    <button onclick="prevCommodity()" class="px-2 py-1 bg-slate-800 rounded text-xs hover:bg-slate-700 font-bold">&lt;</button>
                    <span id="commodity-name" class="px-4 py-1 bg-slate-900 border border-slate-700 rounded text-xs font-semibold min-w-[100px] text-center text-white">Kakao</span>
                    <button onclick="nextCommodity()" class="px-2 py-1 bg-slate-800 rounded text-xs hover:bg-slate-700 font-bold">&gt;</button>
                </div>
            </div>

            <button onclick="generateMarkup()" class="w-full py-2.5 bg-slate-300 text-slate-900 font-semibold rounded-lg text-xs hover:bg-white transition-colors active:scale-[0.98]">
                Markup generieren
            </button>
        </div>
    </div>

    <script>
        // Die Rohstoffdaten direkt im JavaScript (kompatibel mit GitHub Pages!)
        const commodityData = {
            cocoa: {
                name: "Kakao",
                structure: "Hyper-Backwardation",
                score: 93,
                metrics: [
                    { name: "Terminstruktur", wert: "Hyper-Backwardation", score: 99, analysis: "Extreme Knappheit treibt Roll-Preise." },
                    { name: "COT Report", wert: "Bullish", score: 90, analysis: "Physische Käufer müssen Positionen absichern." },
                    { name: "Wetter", wert: "Ernteausfall", score: 98, analysis: "Dürre in Westafrika zerstört Ertragspotenzial." },
                    { name: "Politik", wert: "Exportstopp", score: 85, analysis: "Elfenbeinküste limitiert Exportverträge." }
                ]
            },
            coffee: {
                name: "Coffee (Kaffee)",
                structure: "Starke Backwardation",
                score: 92,
                metrics: [
                    { name: "Terminstruktur", wert: "Backwardation", score: 92, analysis: "Historisches Tief bei zertifizierten Beständen." },
                    { name: "COT Report", wert: "Rekord Net-Long", score: 90, analysis: "Extrem bullishe Positionierung der Fonds." },
                    { name: "Wetter", wert: "El Niño Schäden", score: 95, analysis: "Anhaltende Hitze reduziert Ernten in Vietnam." },
                    { name: "Politik", wert: "EUDR Regulierung", score: 91, analysis: "Logistische Engpässe durch Entwaldungsrichtlinie." }
                ]
            }
        };

        const keys = Object.keys(commodityData);
        let currentIndex = 0;

        function updateDashboard() {
            const current = commodityData[keys[currentIndex]];
            document.getElementById('commodity-name').innerText = current.name;
            document.getElementById('total-score').innerText = current.score + "/100";
            document.getElementById('structure-val').innerText = current.structure;

            const tbody = document.getElementById('metrics-body');
            tbody.innerHTML = "";

            current.metrics.forEach(m => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-800/50";
                tr.innerHTML = `
                    <td class="py-3 font-semibold text-white">${m.name}</td>
                    <td class="py-3 text-slate-400">${m.wert}</td>
                    <td class="py-3 text-center font-mono font-medium ${m.score >= 80 ? 'text-amber-400' : 'text-slate-300'}">${m.score}</td>
                    <td class="py-3 pl-2 text-slate-400 text-[11px] leading-relaxed">${m.analysis}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function nextCommodity() {
            currentIndex = (currentIndex + 1) % keys.length;
            updateDashboard();
        }

        function prevCommodity() {
            currentIndex = (currentIndex - 1 + keys.length) % keys.length;
            updateDashboard();
        }

        function generateMarkup() {
            const current = commodityData[keys[currentIndex]];
            let markup = `|| Metrik || Wert || Score || Marktanalyse ||\n`;
            current.metrics.forEach(m => {
                markup += `| ${m.name} | ${m.wert} | ${m.score} | ${m.analysis} |\n`;
            });
            markup += `\n*Gesamt-Markt-Score:* ${current.score}/100 (${current.structure})`;
            
            navigator.clipboard.writeText(markup).then(() => {
                alert("Confluence-Markup für " + current.name + " erfolgreich kopiert!");
            }).catch(() => {
                alert("Fehler beim Kopieren.");
            });
        }

        // Inititalisierung beim Start
        updateDashboard();
    </script>
</body>
</html>
