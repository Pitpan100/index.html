<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Intelligence Terminal</title>
    <style>
        :root {
            --bg-color: #0c0f16;
            --card-bg: #161a25;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --border-color: #242936;
            --accent-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Navigation / Asset Selector */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        .logo-area h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .logo-area span {
            color: var(--accent-blue);
        }

        .asset-selector {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        /* Main Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 3fr 1fr;
            grid-template-rows: 1fr auto;
            gap: 15px;
            flex: 1;
            min-height: 0;
        }

        /* Left Side: Main Chart Container */
        .chart-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* Right Side: Sidebar for Widgets (Weather & News) */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0;
        }

        .widget-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .widget-box h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .widget-content {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
        }

        /* Bottom Metrics Row */
        .metrics-row {
            grid-column: span 2;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding-top: 5px;
        }

        .metric-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .metric-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        /* Responsive overrides for smaller iPads */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                grid-template-rows: 2fr 1fr auto;
            }
            .sidebar {
                flex-direction: row;
            }
            .metrics-row {
                grid-column: span 1;
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>COMMODITY<span>.INTELLIGENCE</span></h1>
        </div>
        <select id="asset-picker" class="asset-selector" onchange="changeAsset(this.value)">
            <option value="GC=F">Gold (GC=F)</option>
            <option value="SI=F">Silber (SI=F)</option>
            <option value="CL=F">Rohöl WTI (CL=F)</option>
            <option value="HG=F">Kupfer (HG=F)</option>
            <option value="NG=F">Erdgas (NG=F)</option>
            <option value="ZS=F">Sojabohnen (ZS=F)</option>
            <option value="ZC=F">Mais (ZC=F)</option>
            <option value="ZW=F">Weizen (ZW=F)</option>
            <option value="KC=F">Kaffee (KC=F)</option>
            <option value="CC=F">Kakao (CC=F)</option>
            <option value="LE=F">Lebendrind (LE=F)</option>
            <option value="HO=F">Heizöl (HO=F)</option>
        </select>
    </header>

    <div class="dashboard-grid">
        <div class="chart-container" id="tv-chart-wrapper">
            </div>

        <div class="sidebar">
            <div class="widget-box">
                <h3>Agrar-Wetter / Live</h3>
                <iframe class="widget-content" src="https://blogs.unwetterzentrale.de/embed-map/" style="background: transparent;"></iframe>
            </div>
            
            <div class="widget-box">
                <h3>Echtzeit Markt-News</h3>
                <iframe class="widget-content" src="https://rss.app/embed/v1/ticker/tIasZ7XgYgZg6qAn" frameborder="0"></iframe>
            </div>
        </div>

        <div class="metrics-row">
            <div class="metric-card">
                <div class="metric-label">COT Sentiment Score</div>
                <div class="metric-value" id="cot-score">Lade...</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Terminstruktur</div>
                <div class="metric-value" id="term-structure">Lade...</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Netto-Positionierung</div>
                <div class="metric-value" id="inventories">Lade...</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Saisonaler Trend</div>
                <div class="metric-value" id="seasonality">Lade...</div>
            </div>
        </div>
    </div>

    <script>
        let globalData = {};

        // Initalisiert den TradingView Chart dynamisch
        function initTradingView(symbol) {
            // Mapping für saubere TradingView-Ticker-Symbole
            let tvSymbol = "COMEX:GC1!";
            if(symbol === "CL=F") tvSymbol = "NYMEX:CL1!";
            if(symbol === "SI=F") tvSymbol = "COMEX:SI1!";
            if(symbol === "HG=F") tvSymbol = "COMEX:HG1!";
            if(symbol === "NG=F") tvSymbol = "NYMEX:NG1!";
            if(symbol === "ZS=F") tvSymbol = "CBOT:ZS1!";
            if(symbol === "ZC=F") tvSymbol = "CBOT:ZC1!";
            if(symbol === "ZW=F") tvSymbol = "CBOT:ZW1!";
            if(symbol === "KC=F") tvSymbol = "ICEUS:KC1!";
            if(symbol === "CC=F") tvSymbol = "ICEUS:CC1!";
            if(symbol === "LE=F") tvSymbol = "CME:LE1!";
            if(symbol === "HO=F") tvSymbol = "NYMEX:HO1!";

            document.getElementById('tv-chart-wrapper').innerHTML = '<div id="tradingview_widget"></div>';
            
            new TradingView.widget({
                "autosize": true,
                "symbol": tvSymbol,
                "interval": "D",
                "timezone": "Europe/Berlin",
                "theme": "dark",
                "style": "1",
                "locale": "de",
                "toolbar_bg": "#161a25",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "details": true,
                "studies": [
                    "Volume@tv-basicstudies",
                    "VPVolumeProfile@tv-basicstudies"
                ],
                "container_id": "tv-chart-wrapper"
            });
        }

        // Aktualisiert die Anzeige und wendet die intelligente Einfärbung an
        function updateMetrics(ticker) {
            const assetData = globalData[ticker];
            
            if (!assetData) {
                document.getElementById('cot-score').innerText = "N/A";
                document.getElementById('term-structure').innerText = "N/A";
                document.getElementById('inventories').innerText = "N/A";
                document.getElementById('seasonality').innerText = "N/A";
                return;
            }

            // 1. COT Score einfärben
            const cotElem = document.getElementById('cot-score');
            cotElem.innerText = assetData.cot_score;
            if (assetData.cot_score.includes('Optimistisch')) {
                cotElem.style.color = '#22c55e';
                cotElem.style.textShadow = '0 0 10px rgba(34, 197, 94, 0.4)';
            } else if (assetData.cot_score.includes('Bärisch')) {
                cotElem.style.color = '#ef4444';
                cotElem.style.textShadow = '0 0 10px rgba(239, 68, 68, 0.4)';
            } else {
                cotElem.style.color = '#e2e8f0';
                cotElem.style.textShadow = 'none';
            }

            // 2. Terminstruktur einfärben
            const termElem = document.getElementById('term-structure');
            termElem.innerText = assetData.term_structure;
            if (assetData.term_structure.includes('Backwardation')) {
                termElem.style.color = '#3b82f6';
                termElem.style.textShadow = '0 0 10px rgba(59, 130, 246, 0.4)';
            } else {
                termElem.style.color = '#e2e8f0';
                termElem.style.textShadow = 'none';
            }

            // 3. Netto-Positionierung einfärben
            const invElem = document.getElementById('inventories');
            invElem.innerText = assetData.inventories;
            if (assetData.inventories.includes('Net Long')) {
                invElem.style.color = '#10b981';
            } else if (assetData.inventories.includes('Net Short')) {
                invElem.style.color = '#f59e0b';
            } else {
                invElem.style.color = '#e2e8f0';
            }

            // 4. Saisonalität einfärben
            const seaElem = document.getElementById('seasonality');
            seaElem.innerText = assetData.seasonality;
            if (assetData.seasonality.includes('Bullisch')) {
                seaElem.style.color = '#22c55e';
            } else if (assetData.seasonality.includes('Bärisch')) {
                seaElem.style.color = '#ef4444';
            } else {
                seaElem.style.color = '#e2e8f0';
            }
        }

        // Wird aufgerufen, wenn der Benutzer ein anderes Asset wählt
        function changeAsset(ticker) {
            initTradingView(ticker);
            updateMetrics(ticker);
        }

        // Initialer Datenabruf beim Laden der Seite
        async function loadDashboardData() {
            try {
                // Holt die von GitHub Actions generierte JSON-Datenbank
                const response = await fetch('data.json?cache_buster=' + Date.now());
                globalData = await response.json();
                
                // Starte standardmäßig mit Gold
                const defaultAsset = document.getElementById('asset-picker').value;
                changeAsset(defaultAsset);
            } catch (error) {
                console.error("Fehler beim Laden der JSON-Daten:", error);
                document.querySelectorAll('.metric-value').forEach(el => el.innerText = "Fehler (JSON fehlt)");
            }
        }

        // Starten
        window.onload = loadDashboardData;
    </script>
</body>
</html>
