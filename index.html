<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div class="bg-slate-900 p-4 rounded-xl shadow-md border border-slate-800 mb-4">
        <h1 class="text-xl font-bold tracking-tight">Commodity Intelligence Dashboard</h1>
        <p class="text-xs text-slate-400 mt-1">Live-Daten von den globalen Rohstoffmärkten (2026)</p>
    </div>

    <div class="bg-slate-900 rounded-xl p-4 border border-slate-800 shadow-sm space-y-4">
        
        <div class="overflow-x-auto">
            <table class="w-full text-left text-xs text-slate-300">
                <thead>
                    <tr class="border-b border-slate-800 text-slate-400">
                        <th class="pb-2">Metrik</th>
                        <th class="pb-2">Wert</th>
                        <th class="pb-2 text-center">Score</th>
                        <th class="pb-2 pl-2">Live-Analyse</th>
                    </tr>
                </thead>
                <tbody id="metrics-body">
                    <tr><td colspan="4" class="py-4 text-center text-slate-500">Lade Live-Daten...</td></tr>
                </tbody>
            </table>
        </div>

        <hr class="border-slate-800">

        <div class="grid grid-cols-2 gap-4 text-center py-2 bg-slate-950 rounded-lg">
            <div>
                <p class="text-[10px] uppercase text-slate-500 font-semibold tracking-wider">Gesamt-Score</p>
                <p id="total-score" class="text-base font-bold text-emerald-400 mt-0.5">--/100</p>
            </div>
            <div>
                <p class="text-[10px] uppercase text-slate-500 font-semibold tracking-wider">Aktueller Kurs</p>
                <p id="live-price" class="text-xs font-semibold text-slate-200 mt-1">Lade...</p>
            </div>
        </div>

        <div class="space-y-3 pt-2">
            <div class="flex items-center justify-between bg-slate-950 p-2 rounded-lg border border-slate-800">
                <span class="text-xs text-slate-400 font-medium pl-1">Rohstoff</span>
                <div class="flex items-center space-x-1">
                    <button onclick="prevCommodity()" class="px-2 py-1 bg-slate-800 rounded text-xs hover:bg-slate-700 font-bold">&lt;</button>
                    <span id="commodity-name" class="px-4 py-1 bg-slate-900 border border-slate-700 rounded text-xs font-semibold min-w-[135px] text-center text-white">Kakao</span>
                    <button onclick="nextCommodity()" class="px-2 py-1 bg-slate-800 rounded text-xs hover:bg-slate-700 font-bold">&gt;</button>
                </div>
            </div>

            <button onclick="generateMarkup()" class="w-full py-2.5 bg-slate-300 text-slate-900 font-semibold rounded-lg text-xs hover:bg-white transition-colors">
                Confluence-Markup generieren
            </button>
        </div>
    </div>

    <script>
        // Jetzt erweitert auf 7 Rohstoffe (inklusive Weizen und Mais)
        const commodities = [
            { id: "cocoa", name: "Kakao (Cocoa)", ticker: "CC=F", baseScore: 85, defaultPrice: "9200", wText: "Anhaltende Dürre in Westafrika beeinträchtigt Ernte.", pText: "Regulierungen zu EUDR erhöhen Import-Druck." },
            { id: "coffee", name: "Kaffee (Coffee)", ticker: "KC=F", baseScore: 80, defaultPrice: "255", wText: "Saisonale Regenfälle in Brasilien stabilisieren Angebot.", pText: "Exportzölle in Vietnam sorgen für Preisstützung." },
            { id: "wheat", name: "Weizen (Wheat)", ticker: "W=F", baseScore: 70, defaultPrice: "610", wText: "Trockenheit in den US-Plains bedroht die Winterweizen-Ernte.", pText: "Exportrestriktionen und geopolitische Spannungen im Schwarzmeerraum." },
            { id: "corn", name: "Mais (Corn)", ticker: "C=F", baseScore: 68, defaultPrice: "440", wText: "Regenmengen im Corn Belt der USA sorgen für optimalen Start der Aussaat.", pText: "Keine akuten Export-Stopps; stabiler globaler Handelsfluss." },
            { id: "oil", name: "Rohöl (Crude Oil)", ticker: "CL=F", baseScore: 72, defaultPrice: "75", wText: "Hurrikan-Risiko im Golf von Mexiko gefährdet Bohrinseln.", pText: "OPEC+ Förderkürzungen verknappen das Angebot absichtlich." },
            { id: "gas", name: "Erdgas (Nat Gas)", ticker: "NG=F", baseScore: 65, defaultPrice: "2.8", wText: "Milde Temperaturen reduzieren kurzfristig die Heiznachfrage.", pText: "Flüssiggas-Terminals (LNG) laufen auf hoher Kapazität." },
            { id: "gold", name: "Gold", ticker: "GC=F", baseScore: 78, defaultPrice: "2350", wText: "Wetterfaktoren haben keinen messbaren Einfluss.", pText: "Starke Käufe der Zentralbanken stützen das Preisniveau langfristig." }
        ];
        
        let currentIndex = 0;

        async function fetchLiveMarketData(commodity) {
            try {
                const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${commodity.ticker}`);
                const data = await response.json();
                const meta = data.chart.result[0].meta;
                const currentPrice = meta.regularMarketPrice;
                const prevClose = meta.chartPreviousClose;
                
                const changePercent = ((currentPrice - prevClose) / prevClose) * 100;
                return { price: currentPrice, change: changePercent, currency: meta.currency };
            } catch (error) {
                return { price: commodity.defaultPrice, change: 0.00, currency: "USD" };
            }
        }

        async function updateDashboard() {
            const current = commodities[currentIndex];
            document.getElementById('commodity-name').innerText = current.name;
            
            const market = await fetchLiveMarketData(current);
            const dynamicScore = Math.min(100, Math.max(0, Math.round(current.baseScore + (market.change * 2))));
            
            document.getElementById('total-score').innerText = dynamicScore + "/100";
            document.getElementById('live-price').innerText = `${market.price} ${market.currency} (${market.change >= 0 ? '+' : ''}${market.change.toFixed(2)}%)`;

            const tbody = document.getElementById('metrics-body');
            tbody.innerHTML = `
                <tr class="border-b border-slate-800/50">
                    <td class="py-3 font-semibold text-white">Marktpreis (Live)</td>
                    <td class="py-3 text-slate-400">${market.price}</td>
                    <td class="py-3 text-center font-mono font-medium text-amber-400">${dynamicScore}</td>
                    <td class="py-3 pl-2 text-slate-400 text-[11px]">Kurse updaten sich live über Finanz-API.</td>
                </tr>
                <tr class="border-b border-slate-800/50">
                    <td class="py-3 font-semibold text-white">Wetter-Status</td>
                    <td class="py-3 text-slate-400">Monitoring</td>
                    <td class="py-3 text-center font-mono font-medium text-slate-300">85</td>
                    <td class="py-3 pl-2 text-slate-400 text-[11px]">${current.wText}</td>
                </tr>
                <tr class="border-b border-slate-800/50">
                    <td class="py-3 font-semibold text-white">Geopolitik</td>
                    <td class="py-3 text-slate-400">Aktiv</td>
                    <td class="py-3 text-center font-mono font-medium text-slate-300">80</td>
                    <td class="py-3 pl-2 text-slate-400 text-[11px]">${current.pText}</td>
                </tr>
            `;
            
            current.lastCalculatedScore = dynamicScore;
            current.lastPrice = market.price;
        }

        function nextCommodity() {
            currentIndex = (currentIndex + 1) % commodities.length;
            document.getElementById('metrics-body').innerHTML = `<tr><td colspan="4" class="py-4 text-center text-slate-500">Lade Live-Daten...</td></tr>`;
            updateDashboard();
        }

        function prevCommodity() {
            currentIndex = (currentIndex - 1 + commodities.length) % commodities.length;
            document.getElementById('metrics-body').innerHTML = `<tr><td colspan="4" class="py-4 text-center text-slate-500">Lade Live-Daten...</td></tr>`;
            updateDashboard();
        }

        function generateMarkup() {
            const current = commodities[currentIndex];
            let markup = `|| Metrik || Wert || Score || Live-Analyse ||\n`;
            markup += `| Marktpreis (Live) | ${current.lastPrice} | ${current.lastCalculatedScore} | Kurse updaten sich live. |\n`;
            markup += `| Wetter-Status | Monitoring | 85 | ${current.wText} |\n`;
            markup += `| Geopolitik | Aktiv | 80 | ${current.pText} |\n\n`;
            markup += `*Gesamt-Score:* ${current.lastCalculatedScore}/100`;
            
            navigator.clipboard.writeText(markup).then(() => {
                alert("Echtes Confluence-Markup für " + current.name + " kopiert!");
            });
        }

        updateDashboard();
    </script>
</body>
</html>
