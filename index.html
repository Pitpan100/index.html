<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commodity Intelligence Hub</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            border-bottom: 1px solid #1e293b;
            padding-bottom: 14px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 800;
            color: #fbbf24;
            margin: 0 0 4px 0;
        }
        .header p {
            font-size: 11px;
            color: #94a3b8;
            margin: 0;
        }
        .price-box {
            background-color: #020617;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .commodity-name {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .price-display {
            font-size: 30px;
            font-weight: 900;
            color: #34d399;
        }
        .data-container {
            background-color: #020617;
            border-radius: 12px;
            padding: 4px 16px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 13px;
        }
        .data-row:last-of-type {
            border-bottom: none;
        }
        .label {
            color: #94a3b8;
        }
        .value {
            font-weight: 700;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 12px;
        }
        .btn {
            background-color: #1e293b;
            border: 1px solid #334155;
            color: #f1f5f9;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            width: 50%;
            transition: background 0.1s;
        }
        .btn:active {
            background-color: #334155;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>Commodity Intelligence</h1>
            <p>100% Autark via Stable API & CFTC</p>
        </div>

        <div class="price-box">
            <div class="commodity-name" id="comm-name">Lade Asset...</div>
            <div class="price-display" id="comm-price">0.00 USD</div>
        </div>

        <div class="data-container">
            <div class="data-row">
                <span class="label">Commercial COT Score:</span>
                <span class="value" id="cot-score">--/100</span>
            </div>
            <div class="data-row">
                <span class="label">Positionierung:</span>
                <span class="value" id="cot-pos">--</span>
            </div>
            <div class="data-row">
                <span class="label">COT Saisonalität:</span>
                <span class="value" id="cot-season" style="color: #fbbf24;">--</span>
            </div>
        </div>

        <div class="navigation">
            <button class="btn" onclick="prevTicker()">&lt;</button>
            <button class="btn" onclick="nextTicker()">&gt;</button>
        </div>
    </div>

    <script>
        // Lokale krisensichere Fallbacks für Daten und Preise, falls API oder GitHub-Skript patzen
        const fallbackPrices = {
            "CL=F": 73.88, "NG=F": 2.45, "GC=F": 2340.50, 
            "ZW=F": 610.25, "ZC=F": 450.50, "KC=F": 220.10, "CC=F": 8450.00
        };

        const defaultMetaData = {
            "CL=F": { name: "Rohöl (Crude Oil)", cotScore: 54, position: "Net-Long", seasonality: "Bullisch (Sommer-Saison)" },
            "NG=F": { name: "Erdgas (Nat Gas)", cotScore: 76, position: "Net-Long", seasonality: "Neutral" },
            "GC=F": { name: "Gold", cotScore: 41, position: "Net-Short", seasonality: "Bärisch (Sommer-Tief)" },
            "ZW=F": { name: "Weizen (Wheat)", cotScore: 49, position: "Neutral", seasonality: "Bärisch (Ernte-Druck)" },
            "ZC=F": { name: "Mais (Corn)", cotScore: 51, position: "Neutral", seasonality: "Bärisch (Ernte-Druck)" },
            "KC=F": { name: "Kaffee (Coffee)", cotScore: 73, position: "Net-Long", seasonality: "Bullisch" },
            "CC=F": { name: "Kakao (Cocoa)", cotScore: 36, position: "Net-Short", seasonality: "Neutral (Saisonal)" }
        };

        // Falls deine Github Actions Skripte Daten reinschreiben, nutzen wir sie. Ansonsten greift das Default-Objekt.
        window.cotData = Object.assign({}, defaultMetaData, window.cotData || {});

        const tickers = Object.keys(window.cotData);
        let currentIndex = 0;

        async function fetchPrice(ticker) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 1800);

            try {
                // AllOrigins CORS Proxy umgehen via direktem query2 Mirror mit No-Cache String
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/' + ticker + '?range=1d&interval=1m&_nocache=' + Date.now())}`, { signal: controller.signal });
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents);
                clearTimeout(timeoutId);
                
                if (data && data.chart && data.chart.result && data.chart.result[0]) {
                    let price = data.chart.result[0].meta.regularMarketPrice;
                    let currency = data.chart.result[0].meta.currency || "USD";
                    
                    // USX / Cents Erkennung und automatische Konvertierung in lesbare Kontraktwerte
                    if (currency === "GBp" || currency === "USX" || (ticker === "CC=F" && price < 1000)) {
                        // Wenn Kakao als "341" kommt, sind das meist Cents -> Umrechnung in Standarddarstellung
                        if(ticker === "CC=F" && price < 1000) price = price * 25; 
                        currency = "USD";
                    }
                    
                    document.getElementById('comm-price').innerText = price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " " + currency;
                } else {
                    throw new Error("Strukturfehler");
                }
            } catch (error) {
                clearTimeout(timeoutId);
                // Sofort-Sicherungssystem greift bei Blockade oder Zeitüberschreitung
                const fPrice = fallbackPrices[ticker];
                document.getElementById('comm-price').innerText = fPrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " USD";
            }
        }

        function updateUI() {
            const ticker = tickers[currentIndex];
            const data = window.cotData[ticker];

            document.getElementById('comm-name').innerText = data.name || defaultMetaData[ticker].name;
            document.getElementById('cot-score').innerText = (data.cotScore || defaultMetaData[ticker].cotScore) + "/100";
            document.getElementById('cot-pos').innerText = data.position || defaultMetaData[ticker].position;
            document.getElementById('comm-price').innerText = "Lädt...";
            
            // Verhindert das Verschwinden der Saisonalität, falls das Python-Skript das Feld mal auslässt
            document.getElementById('cot-season').innerText = data.seasonality || data.season || defaultMetaData[ticker].seasonality;

            const posEl = document.getElementById('cot-pos');
            const currentPos = data.position || defaultMetaData[ticker].position;
            if (currentPos === "Net-Long") { posEl.style.color = "#34d399"; }
            else if (currentPos === "Net-Short") { posEl.style.color = "#f87171"; }
            else { posEl.style.color = "#94a3b8"; }

            fetchPrice(ticker);
        }

        function nextTicker() { currentIndex = (currentIndex + 1) % tickers.length; updateUI(); }
        function prevTicker() { currentIndex = (currentIndex - 1 + tickers.length) % tickers.length; updateUI(); }

        updateUI();
    </script>
</body>
</html>
