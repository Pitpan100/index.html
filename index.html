<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Commodity Intelligence</title>
    <style>
        body { background: #0b0f19; color: #f3f4f6; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .card { background: #0f172a; border-radius: 16px; padding: 20px; border: 1px solid #1e293b; max-width: 400px; margin: auto; }
        #ticker-wrap { background: #020617; border: 1px solid #ef4444; border-radius: 8px; padding: 10px; margin-bottom: 15px; font-size: 11px; font-weight: bold; color: #f87171; cursor: pointer; text-align: center; }
        select { width: 100%; padding: 12px; background: #1e293b; color: white; border-radius: 8px; border: none; font-weight: bold; margin-bottom: 15px; }
        .price { font-size: 32px; font-weight: 900; color: #34d399; text-align: center; margin-bottom: 15px; }
        #chartCanvas { width: 100%; height: 150px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; display: block; margin-bottom: 15px; }
        .news-box { background: #020617; padding: 12px; border-radius: 8px; font-size: 12px; color: #cbd5e1; border: 1px solid #1e293b; margin-bottom: 15px; line-height: 1.4; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 13px; }
        .label { color: #94a3b8; }
        .val { font-weight: 700; color: #f8fafc; }
    </style>
</head>
<body>
    <div class="card">
        <div id="ticker-wrap" onclick="toggleTicker()">⚠️ ALERT: Marktanalyse aktiv - Klick zum Pausieren</div>
        <select id="asset-select" onchange="updateUI()"></select>
        <div id="price" class="price">Lade Kurs...</div>
        <canvas id="chartCanvas"></canvas>
        <div id="news-box" class="news-box">📰 Lade Nachrichten...</div>
        <div id="stats">
            <div class="row"><span class="label">COT Score:</span><span id="cot" class="val">--</span></div>
            <div class="row"><span class="label">Position:</span><span id="pos" class="val">--</span></div>
            <div class="row"><span class="label">Saisonalität:</span><span id="season" class="val">--</span></div>
            <div class="row"><span class="label">Terminkurve:</span><span id="struct" class="val">--</span></div>
        </div>
    </div>

    <script>
        const assets = {
            "CL=F": { name: "Rohöl", cot: "54/100", pos: "Net-Long", sea: "Bullisch", str: "Backwardation", news: "OPEC+ signalisiert Förderkürzungen zur Preisstützung." },
            "GC=F": { name: "Gold", cot: "41/100", pos: "Net-Short", sea: "Bärisch", str: "Contango", news: "Zentralbank-Goldkäufe setzen den Trend." },
            "SI=F": { name: "Silber", cot: "38/100", pos: "Net-Short", sea: "Bärisch", str: "Contango", news: "Industrielle Nachfrage (Photovoltaik) wächst." },
            "NG=F": { name: "Erdgas", cot: "76/100", pos: "Net-Long", sea: "Neutral", str: "Contango", news: "Hitzewellen treiben den Energiebedarf für AC." },
            "HG=F": { name: "Kupfer", cot: "68/100", pos: "Net-Long", sea: "Bullisch", str: "Backwardation", news: "Minen-Engpässe verknappen das Angebot." },
            "ZW=F": { name: "Weizen", cot: "49/100", pos: "Neutral", sea: "Bärisch", str: "Contango", news: "Trockenheit in Russland beeinflusst Ernte." },
            "ZC=F": { name: "Mais", cot: "51/100", pos: "Neutral", sea: "Bärisch", str: "Contango", news: "US-Anbauflächen zeigen stabile Erträge." },
            "ZS=F": { name: "Sojabohnen", cot: "72/100", pos: "Net-Long", sea: "Neutral", str: "Contango", news: "Exportnachfrage bleibt trotz Preisen hoch." },
            "KC=F": { name: "Kaffee", cot: "73/100", pos: "Net-Long", sea: "Bullisch", str: "Backwardation", news: "Ernteausfälle in Brasilien treiben Preise." },
            "CC=F": { name: "Kakao", cot: "36/100", pos: "Net-Short", sea: "Neutral", str: "Backwardation", news: "Wetterkapriolen in Westafrika führen zu Angebotsknappheit." }
        };

        let tickerPaused = false;
        function toggleTicker() { 
            tickerPaused = !tickerPaused; 
            document.getElementById('ticker-wrap').innerText = tickerPaused ? "⚠️ PAUSIERT - Klick zum Fortfahren" : "⚠️ ALERT: Marktanalyse aktiv - Klick zum Pausieren";
        }

        const sel = document.getElementById('asset-select');
        Object.keys(assets).forEach(key => {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerHTML = assets[key].name;
            sel.appendChild(opt);
        });

        async function updateUI() {
            const ticker = sel.value;
            const meta = assets[ticker];
            document.getElementById('cot').innerText = meta.cot;
            document.getElementById('pos').innerText = meta.pos;
            document.getElementById('season').innerText = meta.sea;
            document.getElementById('struct').innerText = meta.str;
            document.getElementById('news-box').innerText = "📰 " + meta.news;
            
            try {
                const url = `https://corsproxy.io/?https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?range=1mo&interval=1d`;
                const res = await fetch(url);
                const data = await res.json();
                const q = data.chart.result[0].indicators.quote[0].close;
                document.getElementById('price').innerText = data.chart.result[0].meta.regularMarketPrice.toFixed(2) + " USD";
                draw(q);
            } catch(e) { document.getElementById('price').innerText = "Datenfehler"; }
        }

        function draw(data) {
            const canvas = document.getElementById('chartCanvas');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#34d399"; ctx.lineWidth = 2; ctx.beginPath();
            const clean = data.filter(n=>n);
            const min = Math.min(...clean), max = Math.max(...clean);
            clean.forEach((v, i) => {
                const x = (i / (clean.length - 1)) * canvas.width;
                const y = canvas.height - ((v - min) / (max - min) * canvas.height);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }
        
        updateUI();
        setInterval(updateUI, 60000);
    </script>
</body>
</html>
