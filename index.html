<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>COMMODITY.INTELLIGENCE</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Das ist dein Pull-down */
        select { 
            width: 100%; padding: 15px; margin-bottom: 20px; 
            background: #1e293b; color: white; border: 1px solid #3b82f6; 
            border-radius: 8px; font-size: 18px; font-weight: bold; 
        }

        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: #121826; border: 1px solid #1e293b; border-radius: 8px; padding: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .value { font-size: 18px; font-weight: bold; margin-top: 5px; color: #3b82f6; }
    </style>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="container">
    <select id="asset-selector" onchange="updateView()">
        <option value="ICEUS:CC1!" data-cot="65% (L)" data-str="Backw." data-pos="Bullisch" data-seas="High">Kakao (CC)</option>
        <option value="ICEUS:KC1!" data-cot="42% (N)" data-str="Contango" data-pos="Neutral" data-seas="Low">Kaffee (KC)</option>
        <option value="ICEUS:SB1!" data-cot="58% (L)" data-str="Backw." data-pos="Bullisch" data-seas="Steady">Zucker (SB)</option>
    </select>

    <div class="dashboard-grid">
        <div id="chart-area" class="card" style="height: 400px;"></div>
        <div class="card"><iframe src="https://embed.windy.com/" width="100%" height="350" frameborder="0"></iframe></div>
    </div>

    <div class="stats-grid">
        <div class="card"><div class="label">COT INDEX</div><div class="value" id="cot-val">-</div></div>
        <div class="card"><div class="label">STRUKTUR</div><div class="value" id="str-val">-</div></div>
        <div class="card"><div class="label">POSITION</div><div class="value" id="pos-val">-</div></div>
        <div class="card"><div class="label">SAISONAL</div><div class="value" id="seas-val">-</div></div>
    </div>
</div>

<script>
function updateView() {
    const sel = document.getElementById('asset-selector');
    const opt = sel.options[sel.selectedIndex];
    
    // Chart neu rendern
    document.getElementById('chart-area').innerHTML = "";
    new TradingView.widget({
        "container_id": "chart-area",
        "symbol": sel.value,
        "theme": "dark",
        "width": "100%", "height": "100%",
        "allow_symbol_change": false
    });
    
    // Daten in die Boxen schreiben
    document.getElementById('cot-val').innerText = opt.dataset.cot;
    document.getElementById('str-val').innerText = opt.dataset.str;
    document.getElementById('pos-val').innerText = opt.dataset.pos;
    document.getElementById('seas-val').innerText = opt.dataset.seas;
}
window.onload = updateView;
</script>
</body>
</html>
