<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Commodity Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 15px; }
        select { width: 100%; padding: 12px; background: #111; color: #fff; border: 1px solid #444; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
        #chart { width: 100%; height: 220px; background: #000; border-radius: 8px; border: 1px solid #222; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .box { background: #111; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #222; }
        .label { font-size: 8px; color: #666; text-transform: uppercase; }
        .val { font-size: 13px; font-weight: bold; color: #fff; margin-top: 3px; }
    </style>
</head>
<body>
    <div class="card">
        <select id="sel" onchange="upd()">
            <option value="Gold">Gold</option><option value="Rohöl">Rohöl</option><option value="Silber">Silber</option>
            <option value="Kupfer">Kupfer</option><option value="Erdgas">Erdgas</option><option value="Soja">Soja</option>
            <option value="Mais">Mais</option><option value="Weizen">Weizen</option><option value="Kaffee">Kaffee</option>
            <option value="Kakao">Kakao</option><option value="Zucker">Zucker</option>
        </select>
        <div id="chart"></div>
        <div class="grid">
            <div class="box"><div class="label">COT Score</div><div class="val" id="cot">--</div></div>
            <div class="box"><div class="label">Position</div><div class="val" id="pos">--</div></div>
            <div class="box"><div class="label">Saisonalität</div><div class="val" id="sea">--</div></div>
            <div class="box"><div class="label">Terminkurve</div><div class="val" id="str">--</div></div>
        </div>
    </div>
    <script>
        // Deine Datenbank für die 11 Assets
        const db = {
            "Gold": { c: "41/100", p: "Net-Short", s: "Bärisch", k: "Contango" },
            "Rohöl": { c: "54/100", p: "Net-Long", s: "Bullisch", k: "Backwardation" },
            "Silber": { c: "38/100", p: "Net-Short", s: "Bärisch", k: "Contango" },
            "Kupfer": { c: "68/100", p: "Net-Long", s: "Bullisch", k: "Backwardation" },
            "Erdgas": { c: "76/100", p: "Net-Long", s: "Neutral", k: "Contango" },
            "Soja": { c: "72/100", p: "Net-Long", s: "Neutral", k: "Contango" },
            "Mais": { c: "51/100", p: "Neutral", s: "Bärisch", k: "Contango" },
            "Weizen": { c: "49/100", p: "Neutral", s: "Bärisch", k: "Contango" },
            "Kaffee": { c: "73/100", p: "Net-Long", s: "Bullisch", k: "Backwardation" },
            "Kakao": { c: "36/100", p: "Net-Short", s: "Neutral", k: "Backwardation" },
            "Zucker": { c: "58/100", p: "Net-Long", s: "Bullisch", k: "Contango" }
        };
        
        const chart = LightweightCharts.createChart(document.getElementById('chart'), { width: 418, height: 220, layout: { background: { color: '#000' } }});
        const cs = chart.addCandlestickSeries();
        cs.setData([{time:'2026-06-20', open:100, high:110, low:90, close:105}]);
        
        function upd() {
            const v = db[document.getElementById('sel').value];
            document.getElementById('cot').innerText = v.c;
            document.getElementById('pos').innerText = v.p;
            document.getElementById('sea').innerText = v.s;
            document.getElementById('str').innerText = v.k;
        }
        upd();
    </script>
</body>
</html>
