<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Intelligence</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; padding: 15px; }
        .card { background: #0f172a; border-radius: 16px; padding: 20px; border: 1px solid #334155; max-width: 400px; margin: auto; }
        .price { font-size: 32px; font-weight: 800; color: #34d399; margin: 10px 0; }
        .news-item { font-size: 13px; color: #cbd5e1; margin-bottom: 10px; border-left: 3px solid #fbbf24; padding-left: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <select id="ticker" onchange="refreshAll()" class="select" style="width:100%; padding:10px; background:#1e293b; color:white; border-radius:8px; border:none;">
            <option value="GC=F">Gold</option>
            <option value="CL=F">Rohöl</option>
            <option value="SI=F">Silber</option>
        </select>
        <div id="price" class="price">Lädt Kurs...</div>
        <div id="news-container"></div>
    </div>

    <script>
        // Funktion für Live-Kurse
        async function fetchPrice() {
            const ticker = document.getElementById('ticker').value;
            const url = `https://corsproxy.io/?https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const price = data.chart.result[0].meta.regularMarketPrice;
                document.getElementById('price').innerText = price.toFixed(2) + " USD";
            } catch(e) { document.getElementById('price').innerText = "Update fehlgeschlagen"; }
        }

        // Funktion für Live-News (nutzt RSS-Feed als Quelle)
        async function fetchNews() {
            const container = document.getElementById('news-container');
            // Wir nutzen einen kostenlosen RSS-to-JSON Konverter für News
            const url = "https://api.rss2json.com/v1/api.json?rss_url=https://www.cnbc.com/id/19836768/device/rss/rss.html";
            try {
                const res = await fetch(url);
                const data = await res.json();
                container.innerHTML = data.items.slice(0, 3).map(n => `<div class="news-item">${n.title}</div>`).join('');
            } catch(e) { container.innerHTML = "Keine News verfügbar"; }
        }

        function refreshAll() { fetchPrice(); fetchNews(); }
        setInterval(refreshAll, 60000); // Automatisches Update alle 60 Sek.
        refreshAll();
    </script>
</body>
</html>
