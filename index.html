<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>COMMODITY.INTELLIGENCE</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; max-width: 1400px; margin: 0 auto; }
        .card { background: #121826; border: 1px solid #1e293b; border-radius: 8px; padding: 15px; }
        #chart-div { height: 450px; }
        select { width: 100%; padding: 12px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 4px; font-size: 16px; margin-bottom: 15px; }
    </style>
</head>
<body>

<select id="ticker" onchange="load()">
    <option value="ICEUS:CC1!">Kakao</option>
    <option value="ICEUS:KC1!">Kaffee</option>
    <option value="ICEUS:SB1!">Zucker</option>
    <option value="CBOT:ZS1!">Soja</option>
    <option value="COMEX:HG1!">Kupfer</option>
    <option value="NYMEX:CL1!">Rohöl WTI</option>
    <option value="CBOT:ZC1!">Mais</option>
    <option value="COMEX:GC1!">Gold</option>
</select>

<div class="grid">
    <div class="card" id="chart-div"></div>
    <div style="display:flex; flex-direction:column; gap:15px;">
        <div class="card" style="height:250px;">
            <iframe src="https://embed.windy.com/" width="100%" height="180" frameborder="0"></iframe>
        </div>
        <div class="card" id="news-div" style="flex:1;"></div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
function load() {
    const sym = document.getElementById('ticker').value;
    document.getElementById('chart-div').innerHTML = "";
    document.getElementById('news-div').innerHTML = "";
    
    new TradingView.widget({
        "container_id": "chart-div",
        "symbol": sym, // Hier wird jetzt exakt z.B. "ICEUS:CC1!" übergeben
        "theme": "dark",
        "width": "100%",
        "height": "100%",
        "interval": "D",
        "allow_symbol_change": false // Verhindert, dass das Widget selbst sucht
    });
    
    new TradingView.widget({
        "container_id": "news-div",
        "symbol": sym,
        "theme": "dark",
        "widgetType": "timeline",
        "width": "100%",
        "height": "100%",
        "feedMode": "symbol"
    });
}
window.onload = load;
</script>
</body>
</html>
