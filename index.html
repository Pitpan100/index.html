<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commodity Intelligence</title>
    <style>
        body { background: #0b0f19; color: #f3f4f6; font-family: -apple-system, sans-serif; margin: 0; padding: 16px; }
        .card { background: #0f172a; border-radius: 16px; padding: 20px; border: 1px solid #1e293b; max-width: 400px; margin: auto; }
        .price-display { font-size: 32px; font-weight: 900; color: #34d399; margin: 10px 0; }
        #chartCanvas { width: 100%; height: 150px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; }
        .news-box { font-size: 13px; color: #cbd5e1; margin-top: 15px; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <select id="asset-select" onchange="updateData()" style="width:100%; padding:10px; background:#1e293b; color:white; border-radius:8px; border:none;"></select>
        <div id="comm-price" class="price-display">Lade...</div>
        <canvas id="chartCanvas"></canvas>
        <div id="news-box" class="news-box"></div>
        <div id="stats"></div>
    </div>

    <script>
        const assets = { "GC=F": "Gold", "SI=F": "Silber", "CL=F": "Rohöl" };
        
        async function updateData() {
            const ticker = document.getElementById('asset-select').value;
            const priceEl = document.getElementById('comm-price');
            
            // Proxy für PWA-Modus (umgeht Apple-Blockade)
            const url = `https://corsproxy.io/?https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?range=1mo&interval=1d`;
            
            try {
                const res = await fetch(url);
                const json = await res.json();
                const quote = json.chart.result[0].indicators.quote[0];
                const price = json.chart.result[0].meta.regularMarketPrice;
                
                priceEl.innerText = price.toFixed(2) + " USD";
                drawChart(quote.close);
            } catch(e) {
                priceEl.innerText = "Fehler / Offline";
            }
        }

        function drawChart(data) {
            const canvas = document.getElementById('chartCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#34d399";
            ctx.lineWidth = 2;
            ctx.beginPath();
            const step = canvas.width / data.length;
            data.forEach((val, i) => {
                const y = canvas.height - ((val - Math.min(...data)) / (Math.max(...data) - Math.min(...data)) * canvas.height);
                i === 0 ? ctx.moveTo(i * step, y) : ctx.lineTo(i * step, y);
            });
            ctx.stroke();
        }

        // Dropdown füllen
        const sel = document.getElementById('asset-select');
        for (let t in assets) sel.innerHTML += `<option value="${t}">${assets[t]}</option>`;
        updateData();
    </script>
</body>
</html>
