<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commodity Intelligence Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #ffffff;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .header {
            border-bottom: 1px solid #30363d;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 20px;
            color: #ffc107;
            margin: 0 0 4px 0;
        }
        .header p {
            font-size: 12px;
            color: #8b949e;
            margin: 0;
        }
        .commodity-name {
            font-size: 14px;
            color: #8b949e;
            text-align: center;
            margin-bottom: 4px;
        }
        .price-display {
            font-size: 32px;
            font-weight: bold;
            color: #2ea44f;
            text-align: center;
            margin-bottom: 24px;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
        }
        .data-row:last-of-type {
            border-bottom: none;
        }
        .label {
            color: #8b949e;
        }
        .value {
            font-weight: 600;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }
        .btn {
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 48%;
            transition: background 0.2s;
        }
        .btn:active {
            background-color: #30363d;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h1>Commodity Intelligence</h1>
            <p>100% Autark via CFTC & Yahoo API</p>
        </div>

        <div id="dashboard-content">
            <div class="commodity-name" id="comm-name">Lade...</div>
            <div class="price-display" id="comm-price">0.00 USD</div>

            <div class="data-row">
                <span class="label">Commercial COT Score:</span>
                <span class="value" id="cot-score">--/100</span>
            </div>
            <div class="data-row">
                <span class="label">Positionierung:</span>
                <span class="value" id="cot-pos">--</span>
            </div>
            <div class="data-row">
                <span class="label">COT Saisonalität:</span>
                <span class="value" id="cot-season" style="color: #ffc107;">--</span>
            </div>
        </div>

        <div class="navigation">
            <button class="btn" onclick="prevTicker()">&lt;</button>
            <button class="btn" onclick="nextTicker()">&gt;</button>
        </div>
    </div>

    <script>
        // Diese Datenbank wird vom GitHub-Bot jeden Samstagmorgen aktualisiert!
        window.cotData = {
            "CL=F": { name: "Rohöl (Crude Oil)", cotScore: 56, position: "Net-Long", seasonality: "Bullisch (Sommer-Saison)" },
            "NG=F": { name: "Erdgas (Nat Gas)", cotScore: 78, position: "Net-Long", seasonality: "Neutral" },
            "GC=F": { name: "Gold", cotScore: 42, position: "Net-Short", seasonality: "Bärisch (Sommer-Tief)" },
            "W=F": { name: "Weizen (Wheat)", cotScore: 49, position: "Neutral", seasonality: "Bärisch (Ernte-Druck)" },
            "C=F": { name: "Mais (Corn)", cotScore: 53, position: "Neutral", seasonality: "Bärisch (Ernte-Druck)" },
            "KC=F": { name: "Kaffee (Coffee)", cotScore: 71, position: "Net-Long", seasonality: "Bullisch" },
            "CC=F": { name: "Kakao (Cocoa)", cotScore: 34, position: "Net-Short", seasonality: "Neutral" }
        };

        const tickers = Object.keys(window.cotData);
        let currentIndex = 0;

        async function fetchPrice(ticker) {
            try {
                // Nutzung der primären, CORS-freien Yahoo-Finance-Schnittstelle
                const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`);
                const data = await response.json();
                const price = data.chart.result[0].meta.regularMarketPrice;
                document.getElementById('comm-price').innerText = price.toFixed(2) + " USD";
            } catch (error) {
                console.error("Fehler beim Laden des Live-Kurses:", error);
                document.getElementById('comm-price').innerText = "Kurs-Fehler";
            }
        }

        function updateUI() {
            const ticker = tickers[currentIndex];
            const data = window.cotData[ticker];

            document.getElementById('comm-name').innerText = data.name;
            document.getElementById('cot-score').innerText = data.cotScore + "/100";
            document.getElementById('cot-pos').innerText = data.position;
            document.getElementById('cot-season').innerText = data.seasonality || "Neutral";

            // Farbe der Positionierung anpassen
            const posEl = document.getElementById('cot-pos');
            if (data.position === "Net-Long") { posEl.style.color = "#2ea44f"; }
            else if (data.position === "Net-Short") { posEl.style.color = "#f85149"; }
            else { posEl.style.color = "#8b949e"; }

            // Live-Kurs ziehen
            fetchPrice(ticker);
        }

        function nextTicker() {
            currentIndex = (currentIndex + 1) % tickers.length;
            updateUI();
        }

        function prevTicker() {
            currentIndex = (currentIndex - 1 + tickers.length) % tickers.length;
            updateUI();
        }

        // Initialer Start beim Öffnen der Seite
        updateUI();
    </script>
</body>
</html>
