<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commodity Intelligence</title>
    <style>
        body { background: #0b0f19; color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: #0f172a; border-radius: 16px; padding: 16px; border: 1px solid #1e293b; }
        select { width: 100%; padding: 12px; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 8px; font-weight: 600; margin-bottom: 15px; }
        .price-box { font-size: 28px; font-weight: 800; color: #10b981; text-align: center; margin-bottom: 10px; }
        canvas { width: 100%; height: 180px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; }
        .news-box { margin-top: 15px; font-size: 13px; color: #94a3b8; border-top: 1px solid #1e293b; padding-top: 10px; line-height: 1.4; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .box { background: #1e293b; padding: 8px; border-radius: 6px; text-align: center; }
        .label { font-size: 9px; color: #64748b; text-transform: uppercase; }
        .val { font-size: 13px; font-weight: bold; color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="card">
        <select id="asset-select" onchange="update()"></select>
        <div class="price-box" id="price">-- USD</div>
        <canvas id="chartCanvas"></canvas>
        <div class="news-box" id="news">📰 Wird geladen...</div>
        <div class="grid">
            <div class="box"><div class="label">COT Score</div><div class="val" id="cot">--</div></div>
            <div class="box"><div class="label">Position</div><div class="val" id="pos">--</div></div>
            <div class="box"><div class="label">Saisonalität</div><div class="val" id="sea">--</div></div>
            <div class="box"><div class="label">Kurve</div><div class="val" id="str">--</div></div>
        </div>
    </div>

    <script>
        const dataMap = {
            "CL=F": { n: "Rohöl", cot: "54/100", pos: "Net-Long", sea: "Bullisch", str: "Backwardation", news: "OPEC+ signalisiert Kürzungen. Märkte bleiben angespannt. Lagerbestände sinken." },
            "GC=F": { n: "Gold", cot: "41/100", pos: "Net-Short", sea: "Bärisch", str: "Contango", news: "Zentralbank-Käufe auf Rekordniveau. Zinsumfeld drückt auf Preis. Physische Nachfrage in Asien stabil." },
            "SI=F": { n: "Silber", cot: "38/100", pos: "Net-Short", sea: "Bärisch", str: "Contango", news: "Industrie-Nachfrage wächst massiv. Solar-Sektor treibt Defizit. Silber folgt Gold-Trend." },
            "NG=F": { n: "Erdgas", cot: "76/100", pos: "Net-Long", sea: "Neutral", str: "Contango", news: "Hitzewellen erhöhen AC-Bedarf. Lagerbestände im Normalbereich. Export-Nachfrage bleibt bestehen." },
            "HG=F": { n: "Kupfer", cot: "68/100", pos: "Net-Long", sea: "Bullisch", str: "Backwardation", news: "Minen-Engpässe verknappen Angebot. Fokus auf China-Wachstum. Bestandssituation bleibt kritisch." },
            "ZW=F": { n: "Weizen", cot: "49/100", pos: "Neutral", sea: "Bärisch", str: "Contango", news: "Ernteausfälle in Russland belasten. Wettermodelle zeigen Trockenheit. Preiskonsolidierung möglich." },
            "ZC=F": { n: "Mais", cot: "51/100", pos: "Neutral", sea: "Bärisch", str: "Contango", news: "Anbauflächen stabil. Erträge über Erwartungen. Futter-Nachfrage leicht rückläufig." },
            "ZS=F": { n: "Sojabohnen", cot: "72/100", pos: "Net-Long", sea: "Neutral", str: "Contango", news: "Export-Aufträge stark. US-Wetter beeinflusst Ernte. Markt reagiert volatil." },
            "KC=F": { n: "Kaffee", cot: "73/100", pos: "Net-Long", sea: "Bullisch", str: "Backwardation", news: "Brasilien-Ernte unter Druck. Globales Defizit erwartet. Preise auf Jahreshoch." },
            "CC=F": { n: "Kakao", cot: "36/100", pos: "Net-Short", sea: "Neutral", str: "Backwardation", news: "Wetterkapriolen in Westafrika. Lieferketten unter Druck. Historisch hohe Preise." }
        };

        const sel = document.getElementById('asset-select');
        Object.keys(dataMap).forEach(k => sel.innerHTML += `<option value="${k}">${dataMap[k].n}</option>`);

        async function update() {
            const t = sel.value, m = dataMap[t];
            document.getElementById('cot').innerText = m.cot;
            document.getElementById('pos').innerText = m.pos;
            document.getElementById('sea').innerText = m.sea;
            document.getElementById('str').innerText = m.str;
            document.getElementById('news').innerText = "📰 " + m.news;
            
            try {
                const res = await fetch(`https://corsproxy.io/?https://query2.finance.yahoo.com/v8/finance/chart/${t}?range=1mo&interval=1d`);
                const j = await res.json();
                const q = j.chart.result[0].indicators.quote[0];
                document.getElementById('price').innerText = j.chart.result[0].meta.regularMarketPrice.toFixed(2) + " USD";
                draw(q.close, q.volume);
            } catch(e) { document.getElementById('price').innerText = "Fehler"; }
        }

        function draw(c, v) {
            const ctx = document.getElementById('chartCanvas').getContext('2d');
            ctx.canvas.width = ctx.canvas.offsetWidth; ctx.canvas.height = ctx.canvas.offsetHeight;
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            const min = Math.min(...c.filter(n=>n)), max = Math.max(...c.filter(n=>n)), vMax = Math.max(...v.filter(n=>n));
            c.forEach((val, i) => {
                const x = (i / (c.length - 1)) * ctx.canvas.width;
                ctx.fillStyle = "#1e293b"; // Volumen
                ctx.fillRect(x - 2, ctx.canvas.height - (v[i]/vMax * 40), 4, v[i]/vMax * 40);
                ctx.fillStyle = "#10b981"; // Preis
                ctx.fillRect(x - 2, ctx.canvas.height - ((val - min) / (max - min) * 120 + 40), 4, 4);
            });
        }
        update();
    </script>
</body>
</html>
