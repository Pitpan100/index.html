<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Commodity Intelligence</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .card { background: #0f172a; border-radius: 15px; padding: 20px; border: 1px solid #1e293b; max-width: 400px; margin: auto; }
        select { width: 100%; padding: 12px; background: #1e293b; color: white; border-radius: 8px; border: none; margin-bottom: 20px; font-weight: bold; }
        #chartCanvas { width: 100%; height: 160px; background: #020617; border-radius: 8px; margin-bottom: 20px; display: block; border: 1px solid #1e293b; }
        .price { font-size: 28px; font-weight: 900; color: #34d399; margin-bottom: 20px; text-align: center; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e293b; font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <select id="ticker" onchange="loadData()">
            <option value="GC=F">Gold</option>
            <option value="SI=F">Silber</option>
            <option value="CL=F">Rohöl</option>
        </select>
        <div id="price" class="price">Lädt Kurs...</div>
        <canvas id="chartCanvas"></canvas>
        <div id="details"></div>
    </div>

    <script>
        async function loadData() {
            const ticker = document.getElementById('ticker').value;
            const priceEl = document.getElementById('price');
            
            try {
                // Proxy für CORS-Umgehung auf dem iPad
                const url = `https://corsproxy.io/?https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?range=1mo&interval=1d`;
                const res = await fetch(url);
                const data = await res.json();
                
                const quote = data.chart.result[0].indicators.quote[0].close;
                const price = data.chart.result[0].meta.regularMarketPrice;
                
                priceEl.innerText = price.toFixed(2) + " USD";
                drawChart(quote);
            } catch(e) {
                priceEl.innerText = "Daten nicht verfügbar";
            }
        }

        function drawChart(data) {
            const canvas = document.getElementById('chartCanvas');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const cleanData = data.filter(n => n);
            const min = Math.min(...cleanData), max = Math.max(...cleanData);
            
            ctx.strokeStyle = "#34d399";
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            cleanData.forEach((val, i) => {
                const x = (i / (cleanData.length - 1)) * canvas.width;
                const y = canvas.height - ((val - min) / (max - min) * canvas.height);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        loadData();
    </script>
</body>
</html>
