<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commodity Intelligence Dashboard</title>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .logo { font-size: 20px; font-weight: bold; }
        .logo span { color: #3b82f6; }
        .dropdown { background-color: #1e293b; color: white; border: 1px solid #334155; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background-color: #121826; border: 1px solid #1e293b; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .chart-card { background-color: #131722; border: 1px solid #1e293b; border-radius: 8px; padding: 0; overflow: hidden; height: 480px; display: flex; flex-direction: column; }
        .card-title { font-size: 12px; text-transform: uppercase; color: #94a3b8; margin-bottom: 10px; font-weight: 600; }
        .bottom-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .metric-value { font-size: 20px; font-weight: bold; margin-top: 5px; color: #fff; }
    </style>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">COMMODITY<span>.INTELLIGENCE</span></div>
        <select class="dropdown" id="asset-select" onchange="updateDashboard()">
            <option value="ICEUS:CC1!">Kakao (CC)</option>
            <option value="ICEUS:KC1!">Kaffee (KC)</option>
            <option value="ICEUS:SB1!">Zucker (SB)</option>
            <option value="CBOT:ZS1!">Sojabohnen (ZS)</option>
            <option value="COMEX:HG1!">Kupfer (HG)</option>
            <option value="NYMEX:CL1!">Rohöl WTI (CL)</option>
            <option value="CBOT:ZC1!">Mais (ZC)</option>
        </select>
    </div>

    <div class="grid-layout">
        <div class="chart-card" id="chart-container">
            <div id="tradingview_widget" style="height: 100%; width: 100%;"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="card" style="height: 220px;">
                <div class="card-title">AGRAR-WETTER RADAR</div>
                <iframe src="https://embed.windy.com/embed2.html?lat=50&lon=10&zoom=5" width="100%" height="160" frameborder="0"></iframe>
            </div>
            <div class="card" style="height: 240px; overflow-y: auto;">
                <div class="card-title">MARKT-NEWS</div>
                <div id="news-widget"></div>
            </div>
        </div>
    </div>

    <div class="bottom-grid">
        <div class="card"><div class="card-title">SENTIMENT</div><div class="metric-value">Neutral</div></div>
        <div class="card"><div class="card-title">STRUKTUR</div><div class="metric-value">--</div></div>
        <div class="card"><div class="card-title">POSITION</div><div class="metric-value">--</div></div>
        <div class="card"><div class="card-title">TREND</div><div class="metric-value">--</div></div>
    </div>
</div>

<script>
function updateDashboard() {
    const symbol = document.getElementById('asset-select').value;
    
    // Chart neu rendern mit explizitem Börsenplatz (z.B. ICEUS, CBOT)
    document.getElementById('tradingview_widget').innerHTML = "";
    new TradingView.widget({
        "container_id": "tradingview_widget",
        "symbol": symbol,
        "theme": "dark",
        "interval": "D",
        "width": "100%",
        "height": "100%",
        "allow_symbol_change": false
    });

    // News Widget neu laden
    document.getElementById('news-widget').innerHTML = "";
    new TradingView.widget({
        "container_id": "news-widget",
        "symbol": symbol,
        "theme": "dark",
        "widgetType": "timeline",
        "width": "100%",
        "height": "200"
    });
}

window.onload = updateDashboard;
</script>

</body>
</html>
