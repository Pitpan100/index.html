<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Commodity Hub Pro</title>
    <style>
        body { background: #0b0f19; color: #e2e8f0; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: #0f172a; border-radius: 16px; padding: 16px; border: 1px solid #1e293b; }
        select { width: 100%; padding: 12px; background: #1e293b; color: #fff; border: 1px solid #334155; border-radius: 8px; font-weight: 600; margin-bottom: 15px; }
        .price-box { font-size: 32px; font-weight: 800; color: #10b981; text-align: center; margin-bottom: 15px; }
        canvas { width: 100%; height: 160px; background: #020617; border-radius: 8px; border: 1px solid #1e293b; }
        .news-section { margin-top: 15px; font-size: 13px; color: #94a3b8; border-top: 1px solid #1e293b; padding-top: 10px; line-height: 1.4; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: #1e293b; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 10px; text-transform: uppercase; color: #64748b; }
        .stat-value { font-size: 14px; font-weight: bold; color: #f1f5f9; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <select id="asset-select" onchange="updateDashboard()"></select>
        <div class="price-box" id="price">-- USD</div>
        <canvas id="chartCanvas"></canvas>
        <div class="data-grid">
            <div class="stat-box"><div class="stat-label">COT Score</div><div class="stat-value" id="cot">--</div></div>
            <div class="stat-box"><div class="stat-label">Position</div><div class="stat-value" id="pos">--</div></div>
            <div class="stat-box"><div class="stat-label">Saisonalität</div><div class="stat-value" id="season">--</div></div>
            <div class="stat-box"><div class="stat-label">Kurve</div><div class="stat-value" id="struct">--</div></div>
        </div>
        <div class="news-section" id="news">📰 Lade Nachrichten...</div>
    </div>

    <script>
        const assets = {
            "CL=F": { name: "Rohöl", cot: "54/100", pos: "Net-Long", sea: "Bullisch", str: "Backwardation", news: "OPEC+ signalisiert Förderkürzungen." },
            "GC=F": { name: "Gold", cot: "41/100", pos: "Net-Short", sea: "Bärisch", str: "Contango", news: "Zentralbank-Käufe stützen den Markt." },
            "SI=F": { name: "Silber", cot: "38/100", pos: "Net-Short", sea: "Bärisch", str: "Contango", news: "Industrielle Nachfrage wächst." },
            "NG=F": { name: "Erdgas", cot: "76/100", pos: "Net-Long", sea: "Neutral", str: "Contango", news: "AC-Bedarf treibt die Nachfrage." },
            "HG=F": { name: "Kupfer", cot: "68/100", pos: "Net-Long", sea: "Bullisch", str: "Backwardation", news: "Minen-Engpässe verknappen das Angebot." },
            "ZW=F": { name: "Weizen", cot: "49/100", pos: "Neutral", sea: "Bärisch", str: "Contango", news: "Wetterbedingungen in Russland belasten." },
            "ZC=F": { name: "Mais", cot: "51/100", pos: "Neutral", sea: "Bärisch", str: "Contango", news: "US-Ernteberichte zeigen Stabilität." },
            "ZS=F": { name: "Sojabohnen", cot: "72/100", pos: "Net-Long", sea: "Neutral", str: "Contango", news: "Exportnachfrage bleibt hoch." },
            "KC=F": { name: "Kaffee", cot: "73/100", pos: "Net-Long", sea: "Bullisch", str: "Backwardation", news: "Ernteausfälle in Brasilien." },
            "CC=F": { name: "Kakao", cot: "36/100", pos: "Net-Short", sea: "Neutral", str: "Backwardation", news: "Wetter-Probleme in Westafrika." },
            "SB=F": { name: "Zucker", cot: "58/100", pos: "Net-Long", sea: "Bullisch", str: "Contango", news: "Produktionsprognosen gesenkt." },
            "CT=F": { name: "Baumwolle", cot: "45/100", pos: "Neutral", sea: "Bärisch", str: "Contango", news: "Textilnachfrage verlangsamt sich." }
        };

        const sel = document.getElementById('asset-select');
        Object.keys(assets).forEach(key => {
            let opt = document.createElement('option');
            opt.value = key;
            opt.textContent = assets[key].name;
            sel.appendChild(opt);
        });

        async function updateDashboard() {
            const ticker = sel.value;
            const meta = assets[ticker];
            document.getElementById('cot').innerText = meta.cot;
            document.getElementById('pos').innerText = meta.pos;
            document.getElementById('season').innerText = meta.sea;
            document.getElementById('struct').innerText = meta.str;
            document.getElementById('news').innerText = "📰 " + meta.news;
            
            const url = `https://corsproxy.io/?https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?range=1mo&interval=1d`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const q = data.chart.result[0].indicators.quote[0].close;
                document.getElementById('price').innerText = data.chart.result[0].meta.regularMarketPrice.toFixed(2) + " USD";
                drawChart(q);
            } catch(e) { document.getElementById('price').innerText = "Fehler"; }
        }

        function drawChart(data) {
            const canvas = document.getElementById('chartCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#10b981"; ctx.lineWidth = 3; ctx.beginPath();
            const clean = data.filter(n=>n);
            const min = Math.min(...clean), max = Math.max(...clean);
            clean.forEach((v, i) => {
                const x = (i / (clean.length - 1)) * canvas.width;
                const y = canvas.height - ((v - min) / (max - min) * canvas.height);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }
        updateDashboard();
    </script>
</body>
</html>
