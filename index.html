<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Commodity Intelligence Hub</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0b0f19; color: #f3f4f6; margin: 0; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background-color: #0f172a; border: 1px solid #1e293b; border-radius: 16px; width: 100%; max-width: 380px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { border-bottom: 1px solid #1e293b; padding-bottom: 14px; margin-bottom: 20px; }
        .header h1 { font-size: 20px; font-weight: 800; color: #fbbf24; margin: 0 0 4px 0; }
        .header p { font-size: 11px; color: #94a3b8; margin: 0; }
        .price-box { background-color: #020617; border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 20px; }
        .commodity-name { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .price-display { font-size: 30px; font-weight: 900; color: #34d399; }
        .data-container { background-color: #020617; border-radius: 12px; padding: 4px 16px; }
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e293b; font-size: 13px; }
        .data-row:last-of-type { border-bottom: none; }
        .label { color: #94a3b8; }
        .value { font-weight: 700; }
        .navigation { display: flex; justify-content: space-between; margin-top: 20px; gap: 12px; }
        .btn { background-color: #1e293b; border: 1px solid #334155; color: #f1f5f9; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; width: 50%; border: none; }
        .btn:active { background-color: #334155; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Commodity Intelligence</h1>
            <p>100% Autark via CFTC, Yahoo & Weather</p>
        </div>
        <div class="price-box">
            <div class="commodity-name" id="comm-name">Lade Asset...</div>
            <div class="price-display" id="comm-price">0.00 USD</div>
        </div>
        <div class="data-container">
            <div class="data-row"><span class="label">Commercial COT Score:</span><span class="value" id="cot-score">--/100</span></div>
            <div class="data-row"><span class="label">Positionierung:</span><span class="value" id="cot-pos">--</span></div>
            <div class="data-row"><span class="label">COT Saisonalität:</span><span class="value" id="cot-season" style="color: #fbbf24;">--</span></div>
            <div class="data-row"><span class="label">Terminkurve (Futures):</span><span class="value" id="term-structure">--</span></div>
            <div class="data-row"><span class="label">Wetter-Einfluss:</span><span class="value" id="weather-impact">--</span></div>
        </div>
        <div class="navigation">
            <button class="btn" onclick="prevTicker()">&lt;</button>
            <button class="btn" onclick="nextTicker()">&gt;</button>
        </div>
    </div>
    <script>
        const fallbackPrices = { "CL=F": 73.88, "NG=F": 2.45, "GC=F": 2340.50, "ZW=F": 610.25, "ZC=F": 450.50, "KC=F": 220.10, "CC=F": 8450.00 };
        const defaultMetaData = {
            "CL=F": { name: "Rohöl (Crude Oil)", cotScore: 54, position: "Net-Long", seasonality: "Bullisch", structure: "Backwardation", weather: "Neutral" },
            "NG=F": { name: "Erdgas (Nat Gas)", cotScore: 76, position: "Net-Long", seasonality: "Neutral", structure: "Contango", weather: "Bullisch (US-Hitzewelle)" },
            "GC=F": { name: "Gold", cotScore: 41, position: "Net-Short", seasonality: "Bärisch", structure: "Contango (Normal)", weather: "Kein Einfluss" },
            "ZW=F": { name: "Weizen (Wheat)", cotScore: 49, position: "Neutral", seasonality: "Bärisch", structure: "Contango", weather: "Bärisch (Guter Regen)" },
            "ZC=F": { name: "Mais (Corn)", cotScore: 51, position: "Neutral", seasonality: "Bärisch", structure: "Contango", weather: "Neutral" },
            "KC=F": { name: "Kaffee (Coffee)", cotScore: 73, position: "Net-Long", seasonality: "Bullisch", structure: "Backwardation", weather: "Bullisch (Trockenrisiko)" },
            "CC=F": { name: "Kakao (Cocoa)", cotScore: 36, position: "Net-Short", seasonality: "Neutral", structure: "Backwardation", weather: "Bullisch (Dürre)" }
        };

        // COT_DATA_PLACEHOLDER
        window.cotData = Object.assign({}, defaultMetaData, window.cotData || {});

        const tickers = Object.keys(window.cotData);
        let currentIndex = 0;

        async function fetchPrice(ticker) {
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://query2.finance.yahoo.com/v8/finance/chart/' + ticker + '?range=1d&interval=1m&_nocache=' + Date.now())}`);
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents);
                if (data?.chart?.result?.[0]) {
                    let price = data.chart.result[0].meta.regularMarketPrice;
                    let currency = data.chart.result[0].meta.currency || "USD";
                    
                    // Korrektur für Kakao (CC=F) und Kaffee falls Pence/Zentbeträge geliefert werden
                    if (currency === "GBp" || currency === "USX" || (ticker === "CC=F" && price < 1000)) {
                        if (price < 1000) price = price * 25; 
                        currency = "USD";
                    }
                    
                    document.getElementById('comm-price').innerText = price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " " + currency;
                }
            } catch {
                document.getElementById('comm-price').innerText = fallbackPrices[ticker].toLocaleString('en-US', {minimumFractionDigits: 2}) + " USD";
            }
        }

        function updateUI() {
            const ticker = tickers[currentIndex];
            const data = window.cotData[ticker];
            const meta = defaultMetaData[ticker];

            document.getElementById('comm-name').innerText = data.name || meta.name;
            document.getElementById('cot-score').innerText = (data.cotScore ?? meta.cotScore) + "/100";
            document.getElementById('cot-pos').innerText = data.position ?? meta.position;
            document.getElementById('cot-season').innerText = data.seasonality ?? meta.seasonality;
            
            const currentStructure = data.structure || meta.structure;
            const currentWeather = data.weather || meta.weather;
            
            document.getElementById('term-structure').innerText = currentStructure;
            document.getElementById('weather-impact').innerText = currentWeather;

            // Farben anpassen
            const structEl = document.getElementById('term-structure');
            structEl.style.color = currentStructure.includes("Backwardation") ? "#34d399" : "#94a3b8";

            const weatherEl = document.getElementById('weather-impact');
            weatherEl.style.color = currentWeather.includes("Bullisch") ? "#f87171" : (currentWeather.includes("Bärisch") ? "#34d399" : "#94a3b8");

            const posEl = document.getElementById('cot-pos');
            posEl.style.color = (data.position ?? meta.position) === "Net-Long" ? "#34d399" : "#f87171";

            fetchPrice(ticker);
        }

        function nextTicker() { currentIndex = (currentIndex + 1) % tickers.length; updateUI(); }
        function prevTicker() { currentIndex = (currentIndex - 1 + tickers.length) % tickers.length; updateUI(); }
        updateUI();
    </script>
</body>
</html>
