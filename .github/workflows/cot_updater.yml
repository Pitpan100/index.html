name: Automated Commodity Intelligence Updater

on:
  workflow_dispatch: # Ermöglicht den manuellen Start über den Button auf GitHub
  schedule:
    - cron: '0 6 * * 6' # Jeden Samstag um 06:00 UTC

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # WICHTIG: Erlaubt der GitHub Action, Änderungen hochzuladen
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Run Updater Script
        run: python update_cot.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git add data.json
          git diff-index --quiet HEAD || git commit -m "Automated COT Data Update"
          git push
