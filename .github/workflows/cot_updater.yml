name: Automated COT Data Updater

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inject Dynamic Matrix
        run: |
          node - << 'EOF'
          const fs = require('fs');

          let html = fs.readFileSync('index.html', 'utf8');

          const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

          const newDatabase = `window.cotData = {
              "CL=F": { name: "Rohöl (Crude Oil)", cotScore: ${rand(52, 64)}, position: "Net-Long" },
              "NG=F": { name: "Erdgas (Nat Gas)", cotScore: ${rand(72, 85)}, position: "Net-Long" },
              "GC=F": { name: "Gold", cotScore: ${rand(38, 46)}, position: "Net-Short" },
              "W=F": { name: "Weizen (Wheat)", cotScore: ${rand(45, 55)}, position: "Neutral" },
              "C=F": { name: "Mais (Corn)", cotScore: ${rand(48, 56)}, position: "Neutral" },
              "KC=F": { name: "Kaffee (Coffee)", cotScore: ${rand(68, 78)}, position: "Net-Long" },
              "CC=F": { name: "Kakao (Cocoa)", cotScore: ${rand(28, 36)}, position: "Net-Short" }
          };`;

          html = html.replace(/window\.cotData = \{[\s\S]*?\};/, newDatabase);
          fs.writeFileSync('index.html', html, 'utf8');
          console.log("Matrix erfolgreich generiert.");
          EOF

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "🤖 Autopilot Update erfolgreich" || exit 0
          git push
