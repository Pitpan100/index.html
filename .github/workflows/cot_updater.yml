name: Automated COT Data Updater

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Fetch and Parse Official CFTC COT Report
        run: |
          python - <<EOF
          import pandas as pd
          import requests
          import zipfile
          import io
          import re

          # Download des aktuellen Berichts
          url = "https://www.cftc.gov/files/dea/history/deahist2026.zip"
          print("Lade CFTC ZIP-Archiv...")
          r = requests.get(url)
          z = zipfile.ZipFile(io.BytesIO(r.content))
          
          # Erste CSV-Datei finden
          csv_filename = [f for f in z.namelist() if f.endswith('.csv')][0]
          print(f"Entpacke: {csv_filename}")
          
          df = pd.read_csv(z.open(csv_filename))
          
          # Spaltennamen normalisieren (Leerzeichen entfernen, Großbuchstaben)
          df.columns = df.columns.str.strip()
          
          # Spalten dynamisch identifizieren, um Namensänderungen abzufangen
          market_col = [c for c in df.columns if 'Market_and_Market_Exchange' in c or 'Market' in c][0]
          long_col = [c for c in df.columns if 'Comm_Positions_Long_All' in c or 'Commercial Long' in c][0]
          short_col = [c for c in df.columns if 'Comm_Positions_Short_All' in c or 'Commercial Short' in c][0]

          def get_commodity_data(name_string):
              try:
                  row = df[df[market_col].astype(str).str.contains(name_string, na=False, case=False)].iloc[0]
                  longs = float(row[long_col])
                  shorts = float(row[short_col])
                  total = longs + shorts
                  score = int((longs / total) * 100) if total > 0 else 50
                  position = "Net-Long" if score > 50 else "Net-Short"
                  return score, position
              except Exception as e:
                  print(f"⚠️ Hinweis: Konnte '{name_string}' nicht parsen ({e}). Nutze Standardwerte.")
                  return 50, "Neutral"

          # Daten mit maximaler Fehlertoleranz extrahieren
          oil_score, oil_pos = get_commodity_data("CRUDE OIL")
          gas_score, gas_pos = get_commodity_data("NATURAL GAS")
          gold_score, gold_pos = get_commodity_data("GOLD")
          wheat_score, wheat_pos = get_commodity_data("WHEAT")
          corn_score, corn_pos = get_commodity_data("CORN")
          coffee_score, coffee_pos = get_commodity_data("COFFEE")
          cocoa_score, cocoa_pos = get_commodity_data("COCOA")

          # index.html einlesen und updaten
          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          new_database = f"""window.cotData = {{
              "CL=F": {{ name: "Rohöl (Crude Oil)", cotScore: {oil_score}, position: "{oil_pos}" }},
              "NG=F": {{ name: "Erdgas (Nat Gas)", cotScore: {gas_score}, position: "{gas_pos}" }},
              "GC=F": {{ name: "Gold", cotScore: {gold_score}, position: "{gold_pos}" }},
              "W=F": {{ name: "Weizen (Wheat)", cotScore: {wheat_score}, position: "{wheat_pos}" }},
              "C=F": {{ name: "Mais (Corn)", cotScore: {corn_score}, position: "{corn_pos}" }},
              "KC=F": {{ name: "Kaffee (Coffee)", cotScore: {coffee_score}, position: "{coffee_pos}" }},
              "CC=F": {{ name: "Kakao (Cocoa)", cotScore: {cocoa_score}, position: "{cocoa_pos}" }}
          }};"""

          html_updated = re.sub(r'window\.cotData = \{.*?\};', new_database, html, flags=re.DOTALL)

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html_updated)
          print("HTML-Daten erfolgreich generiert!")
          EOF

      - name: Commit & Push Changes
        run: |
          git config --global user.name "COT-Bot"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "🤖 Absolut krisensicheres COT-Update" || exit 0
          git push
