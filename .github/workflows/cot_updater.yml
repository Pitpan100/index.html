name: Automated Commodity Intelligence Updater

on:
  schedule:
    # Jeden Samstagmorgen um 06:00 Uhr UTC
    - cron: '0 6 * * 6'
  workflow_dispatch: # Ermöglicht manuelles Starten

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy requests

    - name: Run COT Updater Script
      run: python update_cot.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Autopilot"
        git config --global user.email "actions@github.com"
        git add index.html
        git commit -m "Autopilot: Echtzeit COT-Daten & Terminstrukturen aktualisiert" || echo "Keine Änderungen vorhanden"
        git push
