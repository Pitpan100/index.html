name: Automated COT Data Updater

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Fetch and Parse Official CFTC COT Report
        run: |
          python - <<EOF
          import pandas as pd
          import requests
          import zipfile
          import io
          import re

          # Download des aktuellen Jahresberichts der CFTC
          url = "https://www.cftc.gov/files/dea/history/deahist2026.zip"
          r = requests.get(url)
          z = zipfile.ZipFile(io.BytesIO(r.content))
          
          # DYNAMISCH: Finde die erste CSV-Datei im ZIP, egal wie die CFTC sie benannt hat
          csv_filename = [f for f in z.namelist() if f.endswith('.csv')][0]
          print(f"Lese Datei aus Archiv: {csv_filename}")
          
          # In Dataframe laden
          df = pd.read_csv(z.open(csv_filename))
          
          def get_commodity_data(name_string):
              try:
                  row = df[df['Market_and_Market_Exchange'].str.contains(name_string, na=False, case=False)].iloc[0]
                  longs = row['Comm_Positions_Long_All']
                  shorts = row['Comm_Positions_Short_All']
                  total = longs + shorts
                  score = int((longs / total) * 100) if total > 0 else 50
                  position = "Net-Long" if score > 50 else "Net-Short"
                  return score, position
              except Exception as e:
                  print(f"Fehler bei Matching von: {name_string} - {e}")
                  return 50, "Neutral"

          # Extrahieren der Rohstoffe
          oil_score, oil_pos = get_commodity_data("CRUDE OIL, LIGHT SWEET")
          gas_score, gas_pos = get_commodity_data("NATURAL GAS - NEW YORK MET")
          gold_score, gold_pos = get_commodity_data("GOLD - COMMODITY EXCHANGE")
          wheat_score, wheat_pos = get_commodity_data("WHEAT - CHICAGO BOARD OF TRADE")
          corn_score, corn_pos = get_commodity_data("CORN - CHICAGO BOARD OF TRADE")
          coffee_score, coffee_pos = get_commodity_data("COFFEE C - ICE FUTURES U.S.")
          cocoa_score, cocoa_pos = get_commodity_data("COCOA - ICE FUTURES U.S.")

          # index.html einlesen und den JS-Datenblock updaten
          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          new_database = f"""window.cotData = {{
              "CL=F": {{ name: "Rohöl (Crude Oil)", cotScore: {oil_score}, position: "{oil_pos}" }},
              "NG=F": {{ name: "Erdgas (Nat Gas)", cotScore: {gas_score}, position: "{gas_pos}" }},
              "GC=F": {{ name: "Gold", cotScore: {gold_score}, position: "{gold_pos}" }},
              "W=F": {{ name: "Weizen (Wheat)", cotScore: {wheat_score}, position: "{wheat_pos}" }},
              "C=F": {{ name: "Mais (Corn)", cotScore: {corn_score}, position: "{corn_pos}" }},
              "KC=F": {{ name: "Kaffee (Coffee)", cotScore: {coffee_score}, position: "{coffee_pos}" }},
              "CC=F": {{ name: "Kakao (Cocoa)", cotScore: {cocoa_score}, position: "{cocoa_pos}" }}
          }};"""

          # Ersetze das alte Objekt via Regulärem Ausdruck
          html_updated = re.sub(r'window\.cotData = \{.*?\};', new_database, html, flags=re.DOTALL)

          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html_updated)
          print("HTML-Daten erfolgreich aktualisiert!")
          EOF

      - name: Commit & Push Changes
        run: |
          git config --global user.name "COT-Bot"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "🤖 Fehlerfreies COT-Update eingepflegt" || exit 0
          git push
